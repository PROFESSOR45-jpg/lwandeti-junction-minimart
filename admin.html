<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Lwandeti Junction Minimart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .preview-img { max-width: 200px; max-height: 200px; object-fit: cover; }
        .drop-zone { border: 3px dashed #cbd5e1; transition: all 0.3s; }
        .drop-zone.drag-over { border-color: #10b981; background-color: #ecfdf5; }
        .extracted-item { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .processing-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .sync-indicator { animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .firebase-status.connected { background-color: #dcfce7; color: #166534; border-color: #166534; }
        .firebase-status.disconnected { background-color: #fee2e2; color: #991b1b; border-color: #991b1b; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="toast" class="hidden fixed bottom-4 right-4 bg-gray-900 text-white px-6 py-3 rounded-xl shadow-lg z-50 flex items-center gap-3">
        <i class="fas fa-check-circle text-emerald-400"></i>
        <span id="toastMessage">Operation successful</span>
    </div>

    <div id="loginScreen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-emerald-600 rounded-xl flex items-center justify-center text-white text-2xl mx-auto mb-4">
                    <i class="fas fa-lock"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">Admin Panel</h1>
                <p class="text-gray-500">Lwandeti Junction Minimart</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="password" placeholder="Enter password" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-emerald-500 focus:outline-none">
                <button onclick="login()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition">Login</button>
            </div>
        </div>
    </div>

    <div id="adminDashboard" class="hidden min-h-screen">
        <header class="bg-emerald-800 text-white shadow-lg sticky top-0 z-40">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center"><i class="fas fa-cog"></i></div>
                    <div>
                        <h1 class="font-bold">Admin Dashboard</h1>
                        <p class="text-xs text-emerald-200" id="lastSyncTime">Last sync: Just now</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div id="firebaseStatus" class="firebase-status disconnected flex items-center gap-2 px-3 py-1 rounded-full border text-xs">
                        <i class="fas fa-circle text-[8px]"></i> <span id="firebaseStatusText">Offline</span>
                    </div>
                    <button onclick="logout()" class="px-3 py-1 bg-red-500/20 hover:bg-red-500 rounded text-xs transition">Logout</button>
                </div>
            </div>
        </header>

        <div class="container mx-auto px-4 py-8">
            <div class="bg-white rounded-2xl shadow-sm p-6 mb-8 border-t-4 border-purple-500">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-purple-700"><i class="fas fa-robot mr-2"></i>AI Mass Upload</h2>
                    <span class="text-xs text-gray-400">PDF / JPG / PNG</span>
                </div>

                <div id="dropZone" class="drop-zone rounded-2xl p-8 text-center cursor-pointer mb-6" onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" class="hidden" accept=".pdf,.png,.jpg,.jpeg" multiple onchange="handleFileSelect(event)">
                    <i class="fas fa-cloud-upload-alt text-4xl text-purple-600 mb-2"></i>
                    <p class="text-sm font-medium">Drop invoice or take shelf photo</p>
                </div>

                <div id="processingStatus" class="hidden mb-6 bg-purple-50 p-4 rounded-xl border border-purple-200">
                    <div class="flex items-center gap-3 mb-2">
                        <i class="fas fa-brain text-purple-600 processing-pulse"></i>
                        <span id="processingText" class="text-sm font-bold text-purple-900 italic">Reading data...</span>
                    </div>
                    <div class="w-full bg-purple-200 h-1.5 rounded-full overflow-hidden">
                        <div id="progressBar" class="bg-purple-600 h-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>

                <div id="extractedProducts" class="hidden">
                    <div class="flex justify-between items-center mb-4 border-b pb-2">
                        <h3 class="font-bold text-gray-700">Review Items</h3>
                        <div class="flex gap-2">
                            <button onclick="selectAllExtracted()" class="text-xs text-blue-600">Select All</button>
                            <button onclick="clearExtracted()" class="text-xs text-red-600">Clear</button>
                        </div>
                    </div>
                    <div id="extractedList" class="space-y-3 max-h-[500px] overflow-y-auto mb-6 pr-2"></div>
                    <button onclick="confirmMassUpload()" class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold hover:bg-purple-700 shadow-lg transition">
                        Confirm & Upload to Cloud (<span id="selectedCount">0</span>)
                    </button>
                </div>
            </div>

            <div class="grid lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-2xl shadow-sm p-6 sticky top-24">
                        <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fas fa-plus-circle text-emerald-600"></i>Quick Add</h2>
                        <form id="productForm" onsubmit="event.preventDefault(); saveProduct();" class="space-y-3">
                            <input type="text" id="prodName" required placeholder="Product Name" class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-emerald-500 outline-none">
                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" id="prodPrice" required placeholder="Retail (KSh)" class="w-full px-4 py-2 rounded-lg border bg-emerald-50">
                                <input type="number" id="prodWholesalePrice" placeholder="Wholesale" class="w-full px-4 py-2 rounded-lg border bg-blue-50">
                            </div>
                            <select id="prodCategory" required class="w-full px-4 py-2 rounded-lg border outline-none"></select>
                            <input type="text" id="prodUnit" required placeholder="Unit (e.g. per kg)" class="w-full px-4 py-2 rounded-lg border">
                            <div id="imagePreview" class="hidden"><img id="previewImg" class="rounded-lg mb-2 mx-auto"></div>
                            <input type="file" id="prodImageFile" accept="image/*" class="text-xs" onchange="previewImage(this)">
                            <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition">Save to Cloud</button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <div class="bg-white rounded-2xl shadow-sm p-6">
                        <div class="flex flex-col md:flex-row justify-between gap-4 mb-6">
                            <h2 class="text-lg font-bold">Inventory</h2>
                            <div class="flex gap-2">
                                <select id="filterCategory" onchange="filterProducts()" class="px-3 py-2 rounded-lg border text-sm"></select>
                                <input type="text" id="searchProducts" placeholder="Search..." oninput="searchProductsList()" class="px-3 py-2 rounded-lg border text-sm">
                            </div>
                        </div>
                        <div id="productsList" class="space-y-3 min-h-[400px]"></div>
                        <div class="mt-8 pt-6 border-t flex justify-between">
                            <button onclick="exportJSON()" class="text-sm text-emerald-700 font-medium hover:underline"><i class="fas fa-download mr-1"></i>Export Backup</button>
                            <p class="text-xs text-gray-400">System running on Firebase v10.7.1</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-xl">Edit Product</h3>
                <button onclick="closeEditModal()"><i class="fas fa-times text-gray-400 hover:text-red-500"></i></button>
            </div>
            <form id="editForm" onsubmit="event.preventDefault(); updateProduct();" class="space-y-4">
                <input type="hidden" id="editId">
                <input type="text" id="editName" required class="w-full p-3 rounded-lg border">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs text-gray-400">Retail</label><input type="number" id="editPrice" required class="w-full p-3 rounded-lg border"></div>
                    <div><label class="text-xs text-gray-400">Wholesale</label><input type="number" id="editWholesalePrice" class="w-full p-3 rounded-lg border"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="editCategory" required class="w-full p-3 rounded-lg border"></select>
                    <input type="text" id="editUnit" required class="w-full p-3 rounded-lg border">
                </div>
                <div class="flex items-center gap-4 py-2 border-y">
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="editPopular"> Popular</label>
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="editStock"> In Stock</label>
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold">Update Inventory</button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCi5xL9UmwubLlY0bn0Ae8TH4lG-9720oQ",
            authDomain: "lwandeti-junction-minimart.firebaseapp.com",
            projectId: "lwandeti-junction-minimart",
            storageBucket: "lwandeti-junction-minimart.firebasestorage.app",
            messagingSenderId: "282672112956",
            appId: "1:282672112956:web:1a85643cc1f3c410676a39",
            measurementId: "G-C3RV1N7D2N"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let products = [];
        let extractedProducts = [];
        let editingId = null;

        const categories = [
            { id: 'food_staples', name: 'Food Staples & Grains', keywords: ['rice', 'maize', 'flour', 'sugar', 'salt', 'oil', 'beans'] },
            { id: 'beverages', name: 'Beverages & Dairy', keywords: ['milk', 'yogurt', 'juice', 'soda', 'water', 'tea', 'coffee', 'coke', 'pepsi'] },
            { id: 'personal_care', name: 'Personal Care & Hygiene', keywords: ['soap', 'shampoo', 'toothpaste', 'tissue', 'sanitary', 'pad'] },
            { id: 'household', name: 'Household Items', keywords: ['bucket', 'basin', 'broom', 'mop', 'bulb', 'detergent'] },
            { id: 'stationery', name: 'Stationery & Office', keywords: ['pen', 'pencil', 'book', 'paper', 'eraser', 'file'] },
            { id: 'bakery', name: 'Bakery', keywords: ['bread', 'cake', 'bun', 'biscuit', 'cookie'] },
            { id: 'hardware', name: 'Hardware & Tools', keywords: ['nail', 'hammer', 'saw', 'paint', 'wire', 'pipe'] },
            { id: 'agriculture', name: 'Agrovet', keywords: ['seed', 'fertilizer', 'pesticide', 'herbicide', 'hoe'] },
            { id: 'baby_care', name: 'Baby Care', keywords: ['diaper', 'wipe', 'formula', 'baby'] },
            { id: 'accessories', name: 'Accessories', keywords: ['watch', 'belt', 'bag', 'purse', 'charger'] },
            { id: 'other', name: 'Other', keywords: ['misc'] }
        ];

        // Auth Logic
        if (localStorage.getItem('adminLoggedIn') === 'true') showDashboard();

        function login() {
            if (document.getElementById('password').value === 'admin123') {
                localStorage.setItem('adminLoggedIn', 'true');
                showDashboard();
            } else alert('Access Denied');
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            initApp();
        }

        function initApp() {
            populateCategorySelects();
            setupRealtimeSync();
            updateConnectivityStatus();
        }

        function populateCategorySelects() {
            const selects = ['prodCategory', 'editCategory', 'filterCategory'];
            selects.forEach(id => {
                const el = document.getElementById(id);
                el.innerHTML = (id === 'filterCategory' ? '<option value="">All Categories</option>' : '') + 
                    categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            });
        }

        function setupRealtimeSync() {
            db.collection('products').orderBy('name').onSnapshot(snapshot => {
                products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderProductsList();
                document.getElementById('lastSyncTime').textContent = `Last sync: ${new Date().toLocaleTimeString()}`;
            });
        }

        function updateConnectivityStatus() {
            db.collection('.info/connected').onSnapshot(s => {
                const connected = s.data().connected;
                const el = document.getElementById('firebaseStatus');
                el.className = `firebase-status ${connected ? 'connected' : 'disconnected'} flex items-center gap-2 px-3 py-1 rounded-full border text-xs`;
                document.getElementById('firebaseStatusText').textContent = connected ? 'Online' : 'Offline Mode';
            });
        }

        // CRUD Operations
        async function saveProduct() {
            const data = {
                name: document.getElementById('prodName').value,
                price: parseFloat(document.getElementById('prodPrice').value),
                wholesalePrice: parseFloat(document.getElementById('prodWholesalePrice').value) || null,
                category: document.getElementById('prodCategory').value,
                unit: document.getElementById('prodUnit').value,
                inStock: true,
                image: document.getElementById('previewImg').src || 'https://via.placeholder.com/150',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection('products').add(data);
            document.getElementById('productForm').reset();
            document.getElementById('imagePreview').classList.add('hidden');
            showToast('Product added to cloud');
        }

        async function updateProduct() {
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('editName').value,
                price: parseFloat(document.getElementById('editPrice').value),
                wholesalePrice: parseFloat(document.getElementById('editWholesalePrice').value) || null,
                category: document.getElementById('editCategory').value,
                unit: document.getElementById('editUnit').value,
                popular: document.getElementById('editPopular').checked,
                inStock: document.getElementById('editStock').checked
            };
            await db.collection('products').doc(id).update(data);
            closeEditModal();
            showToast('Inventory updated');
        }

        async function deleteProduct(id) {
            if (confirm('Delete this product permanently?')) {
                await db.collection('products').doc(id).delete();
                showToast('Removed from inventory');
            }
        }

        // UI Rendering
        function renderProductsList(data = products) {
            const container = document.getElementById('productsList');
            container.innerHTML = data.map(p => `
                <div class="flex items-center gap-4 p-3 bg-gray-50 rounded-xl hover:shadow-md transition">
                    <img src="${p.image}" class="w-12 h-12 object-cover rounded-lg">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-gray-800 truncate">${p.name}</h4>
                        <p class="text-xs text-gray-500">Retail: KSh ${p.price} | <span class="text-blue-600">Wholesale: ${p.wholesalePrice || 'N/A'}</span></p>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="editProduct('${p.id}')" class="p-2 text-blue-600 hover:bg-blue-100 rounded-lg"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProduct('${p.id}')" class="p-2 text-red-600 hover:bg-red-100 rounded-lg"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // AI Mass Upload Logic
        async function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            document.getElementById('processingStatus').classList.remove('hidden');
            document.getElementById('extractedProducts').classList.add('hidden');
            
            let count = 0;
            for (const file of files) {
                count++;
                document.getElementById('progressBar').style.width = `${(count/files.length)*100}%`;
                document.getElementById('processingText').textContent = `Analyzing ${file.name}...`;
                
                const imgData = await fileToDataUrl(file);
                const result = await Tesseract.recognize(imgData, 'eng');
                processOcrText(result.data.text);
            }
            
            document.getElementById('processingStatus').classList.add('hidden');
            displayExtractedProducts();
        }

        function processOcrText(text) {
            const lines = text.split('\n');
            lines.forEach(line => {
                const match = line.match(/(.+?)\s+(\d{2,})/); // Simple Name + Price regex
                if (match && match[1].length > 2) {
                    const name = match[1].trim();
                    const price = parseFloat(match[2]);
                    const catId = detectCategory(name);
                    
                    extractedProducts.push({
                        name, price, 
                        wholesalePrice: Math.round(price * 0.85), // Smart guess
                        category: catId,
                        unit: 'per piece',
                        selected: true,
                        image: 'https://via.placeholder.com/150'
                    });
                }
            });
        }

        function detectCategory(name) {
            const n = name.toLowerCase();
            for (const cat of categories) {
                if (cat.keywords.some(k => n.includes(k))) return cat.id;
            }
            return 'other';
        }

        function displayExtractedProducts() {
            const container = document.getElementById('extractedList');
            extractedProducts.sort((a,b) => a.category.localeCompare(b.category));
            
            let html = '';
            let lastCat = '';
            
            extractedProducts.forEach((p, i) => {
                if (p.category !== lastCat) {
                    lastCat = p.category;
                    const cName = categories.find(c => c.id === lastCat).name;
                    html += `<div class="text-[10px] font-bold text-purple-600 bg-purple-50 p-1 px-2 rounded mb-2 uppercase tracking-widest mt-4">${cName}</div>`;
                }
                
                const margin = p.wholesalePrice ? Math.round(((p.price - p.wholesalePrice)/p.price)*100) : 0;

                html += `
                    <div class="flex items-center gap-3 p-2 bg-white border rounded-lg text-sm shadow-sm">
                        <input type="checkbox" checked onchange="extractedProducts[${i}].selected = this.checked; updateSelectedCount()">
                        <div class="flex-1 grid grid-cols-2 gap-2">
                            <input type="text" value="${p.name}" class="bg-transparent border-b font-medium" onchange="extractedProducts[${i}].name = this.value">
                            <div class="flex gap-1">
                                <input type="number" value="${p.price}" class="w-14 border rounded px-1" title="Retail">
                                <input type="number" value="${p.wholesalePrice}" class="w-14 border rounded px-1 text-blue-600" title="Wholesale">
                                <span class="text-[9px] flex items-center text-green-600 font-bold">${margin}%</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            document.getElementById('extractedProducts').classList.remove('hidden');
            updateSelectedCount();
        }

        async function confirmMassUpload() {
            const selected = extractedProducts.filter(p => p.selected);
            if (!selected.length) return;
            
            const batch = db.batch();
            selected.forEach(p => {
                const ref = db.collection('products').doc();
                const {selected, ...cleanData} = p;
                batch.set(ref, {...cleanData, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
            });
            
            await batch.commit();
            extractedProducts = [];
            document.getElementById('extractedProducts').classList.add('hidden');
            showToast(`Synced ${selected.length} items to cloud`);
        }

        // Helpers
        function fileToDataUrl(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        function updateSelectedCount() {
            document.getElementById('selectedCount').textContent = extractedProducts.filter(p => p.selected).length;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('imagePreview').classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function editProduct(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = p.name;
            document.getElementById('editPrice').value = p.price;
            document.getElementById('editWholesalePrice').value = p.wholesalePrice || '';
            document.getElementById('editCategory').value = p.category;
            document.getElementById('editUnit').value = p.unit;
            document.getElementById('editPopular').checked = p.popular || false;
            document.getElementById('editStock').checked = p.inStock !== false;
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }

        function searchProductsList() {
            const q = document.getElementById('searchProducts').value.toLowerCase();
            const f = products.filter(p => p.name.toLowerCase().includes(q));
            renderProductsList(f);
        }

        function filterProducts() {
            const cat = document.getElementById('filterCategory').value;
            const f = cat ? products.filter(p => p.category === cat) : products;
            renderProductsList(f);
        }

        function exportJSON() {
            const blob = new Blob([JSON.stringify(products, null, 2)], {type : 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'inventory_backup.json'; a.click();
        }
    </script>
</body>
</html>
