<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Lwandeti Junction Minimart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .tab-btn.active { border-bottom: 3px solid #059669; color: #059669; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #10b981; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .upload-label { cursor: pointer; transition: all 0.3s; }
        .upload-label:hover { background: #ecfdf5; border-color: #10b981; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="toast" class="hidden fixed bottom-4 right-4 bg-gray-900 text-white px-6 py-3 rounded-xl shadow-lg z-50 flex items-center gap-3">
        <i id="toastIcon" class="fas fa-check-circle text-emerald-400"></i>
        <span id="toastMessage">Done</span>
    </div>

    <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-emerald-900 p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
            <div class="w-20 h-20 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-3xl mx-auto mb-4 shadow-lg">
                <i class="fas fa-user-shield"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Admin Login</h1>
            <input type="password" id="password" placeholder="Enter Password" class="w-full px-5 py-4 rounded-2xl border-2 mb-4 outline-none focus:border-emerald-500 transition-all">
            <button onclick="login()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 transition-all">Access Dashboard</button>
        </div>
    </div>

    <div id="adminDashboard" class="hidden min-h-screen">
        <header class="bg-emerald-800 text-white shadow-lg sticky top-0 z-40">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                <h1 class="font-bold tracking-tight">LWANDETI ADMIN</h1>
                <div class="flex items-center gap-3">
                    <button onclick="downloadPriceListPDF()" class="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2"><i class="fas fa-file-pdf text-red-400"></i> Export PDF</button>
                    <button onclick="logout()" class="bg-red-500 hover:bg-red-600 p-2 rounded-lg"><i class="fas fa-lock text-sm"></i></button>
                </div>
            </div>
        </header>

        <div class="container mx-auto px-4 py-6">
            <div class="flex gap-6 border-b mb-6 overflow-x-auto bg-white px-4 rounded-t-xl">
                <button onclick="switchTab('inventory')" id="tab-inventory" class="tab-btn active py-4 font-bold text-sm">Inventory</button>
                <button onclick="switchTab('categories')" id="tab-categories" class="tab-btn py-4 font-bold text-sm">Categories</button>
                <button onclick="switchTab('ai')" id="tab-ai" class="tab-btn py-4 font-bold text-sm">AI Mass Scanner</button>
            </div>

            <div id="view-inventory" class="tab-content">
                <div class="grid lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-emerald-500 sticky top-24">
                            <h2 class="font-bold mb-4">Add Product</h2>
                            <form id="productForm" onsubmit="event.preventDefault(); saveProduct();" class="space-y-3">
                                <input type="text" id="prodName" required placeholder="Product Name" class="w-full p-3 border-2 border-gray-50 rounded-xl text-sm outline-none focus:border-emerald-500">
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="number" id="prodPrice" required placeholder="Retail Price" class="w-full p-3 border-2 border-gray-50 rounded-xl text-sm">
                                    <input type="text" id="prodUnit" required placeholder="Unit (e.g. 1kg)" class="w-full p-3 border-2 border-gray-50 rounded-xl text-sm">
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <select id="prodCategory" required onchange="updateSubSelect('prod')" class="w-full p-3 border-2 border-gray-50 rounded-xl text-sm"></select>
                                    <select id="prodSubCategory" required class="w-full p-3 border-2 border-gray-50 rounded-xl text-sm"><option value="">Sub-category</option></select>
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="upload-label flex flex-col items-center justify-center border-2 border-dashed border-gray-200 rounded-xl py-4 bg-gray-50/50">
                                        <i class="fas fa-cloud-upload-alt text-emerald-500 mb-1"></i>
                                        <span class="text-[10px] font-bold text-gray-400 uppercase" id="uploadStatus">Upload Photo</span>
                                        <input type="file" class="hidden" accept="image/*" onchange="uploadImage(this, 'prodImageUrl', 'uploadStatus')">
                                    </label>
                                    <input type="url" id="prodImageUrl" placeholder="Or paste Image URL" class="w-full p-3 border-2 border-gray-50 rounded-xl text-sm">
                                </div>
                                <button type="submit" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-emerald-700 transition-all">Add to Inventory</button>
                            </form>
                        </div>
                    </div>
                    <div class="lg:col-span-2">
                        <div class="bg-white p-6 rounded-2xl shadow-sm">
                            <input type="text" id="searchProducts" placeholder="Search products..." oninput="renderProducts()" class="w-full px-4 py-3 border-2 border-gray-50 rounded-xl text-sm mb-6 outline-none focus:border-emerald-500">
                            <div id="productsList" class="space-y-3"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-categories" class="tab-content hidden">
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-2xl shadow-sm">
                        <h2 class="font-bold text-lg mb-6" id="catFormTitle">Manage Category</h2>
                        <form id="categoryForm" onsubmit="event.preventDefault(); saveCategory();" class="space-y-4">
                            <input type="hidden" id="catId">
                            <input type="text" id="catName" required placeholder="Category Name" class="w-full p-4 border-2 border-gray-50 rounded-xl">
                            <textarea id="catSubs" placeholder="Sub-categories (comma separated)" class="w-full p-4 border-2 border-gray-50 rounded-xl text-sm h-24"></textarea>
                            <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">Save Category</button>
                        </form>
                    </div>
                    <div class="bg-white p-8 rounded-2xl shadow-sm"><div id="catAdminList" class="space-y-3"></div></div>
                </div>
            </div>

            <div id="view-ai" class="tab-content hidden">
                <div class="bg-white p-10 rounded-2xl shadow-sm text-center">
                    <div id="dropZone" class="border-4 border-dashed border-gray-100 rounded-3xl p-16 cursor-pointer hover:border-emerald-300 transition-all bg-gray-50" onclick="document.getElementById('aiFileInput').click()">
                        <input type="file" id="aiFileInput" class="hidden" accept="image/*" multiple onchange="handleAIUpload(event)">
                        <i class="fas fa-camera-retro text-5xl text-emerald-600 mb-4"></i>
                        <h3 class="text-xl font-bold">Fast Stock Scanner</h3>
                        <p class="text-gray-400 text-sm">Upload counter photos or receipts. AI will extract names and prices.</p>
                    </div>
                    <div id="scanLoader" class="hidden mt-8">
                        <div class="loader mx-auto"></div>
                        <p class="text-emerald-600 font-bold mt-2">AI is reading text... please wait.</p>
                    </div>
                    <div id="aiReviewSection" class="hidden mt-10 text-left">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold">Detected Items (<span id="detectedCount">0</span>)</h3>
                            <button onclick="saveAIScannedItems(this)" class="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold">Confirm & Save to Stock</button>
                        </div>
                        <div class="overflow-x-auto border rounded-2xl">
                            <table class="w-full text-sm">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="p-3 text-left">Photo</th>
                                        <th class="p-3 text-left">Product Name</th>
                                        <th class="p-3 text-left">Price</th>
                                        <th class="p-3 text-left">Category</th>
                                        <th class="p-3"></th>
                                    </tr>
                                </thead>
                                <tbody id="aiResultsTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-lg w-full p-8">
            <h3 class="font-bold text-2xl mb-6">Edit Product</h3>
            <form id="editForm" onsubmit="event.preventDefault(); updateProduct();" class="space-y-4">
                <input type="hidden" id="editId">
                <input type="text" id="editName" required class="w-full p-4 border-2 border-gray-50 rounded-2xl">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="editPrice" required class="w-full p-4 border-2 border-gray-50 rounded-2xl">
                    <input type="text" id="editUnit" required class="w-full p-4 border-2 border-gray-50 rounded-2xl">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="editCategory" required onchange="updateSubSelect('edit')" class="w-full p-4 border-2 border-gray-50 rounded-2xl"></select>
                    <select id="editSubCategory" required class="w-full p-4 border-2 border-gray-50 rounded-2xl"></select>
                </div>
                <input type="url" id="editImageUrl" placeholder="Image URL" class="w-full p-4 border-2 border-gray-50 rounded-2xl">
                <div class="flex gap-3 pt-4"><button type="submit" class="flex-1 bg-emerald-600 text-white py-4 rounded-2xl font-bold">Update</button><button type="button" onclick="closeEditModal()" class="px-8 bg-gray-100 rounded-2xl font-bold">Cancel</button></div>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCi5xL9UmwubLlY0bn0Ae8TH4lG-9720oQ",
            authDomain: "lwandeti-junction-minimart.firebaseapp.com",
            projectId: "lwandeti-junction-minimart",
            storageBucket: "lwandeti-junction-minimart.firebasestorage.app",
            messagingSenderId: "282672112956",
            appId: "1:282672112956:web:1a85643cc1f3c410676a39"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage(); 

        let products = [], categories = [], tempExtracted = [];
        let ocrWorker = null;

        function login() { if(document.getElementById('password').value === 'admin123') { sessionStorage.setItem('admin_auth', 'true'); showDashboard(); } else { alert('Wrong Password'); } }
        function logout() { sessionStorage.clear(); location.reload(); }
        if(sessionStorage.getItem('admin_auth')) showDashboard();

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            syncData();
            initOCR();
        }

        async function initOCR() {
            if (!ocrWorker) {
                ocrWorker = await Tesseract.createWorker('eng');
            }
        }

        function syncData() {
            db.collection('categories').onSnapshot(snap => {
                categories = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderCategories();
                updateSelects();
            });
            db.collection('products').orderBy('createdAt', 'desc').onSnapshot(snap => {
                products = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderProducts();
            });
        }

        async function uploadImage(fileInput, targetUrlInputId, statusId) {
            const file = fileInput.files[0]; if(!file) return;
            const status = document.getElementById(statusId);
            status.innerText = "Uploading...";
            try {
                const storageRef = storage.ref('products/' + Date.now() + '_' + file.name);
                const snapshot = await storageRef.put(file);
                const url = await snapshot.ref.getDownloadURL();
                document.getElementById(targetUrlInputId).value = url;
                status.innerText = "Complete!";
                showToast('Image Uploaded');
            } catch (error) { status.innerText = "Failed"; }
        }

        async function saveCategory() {
            const id = document.getElementById('catId').value;
            const name = document.getElementById('catName').value;
            const data = {
                name: name,
                subs: document.getElementById('catSubs').value.split(',').map(s => s.trim()).filter(s => s !== "")
            };
            if(id) await db.collection('categories').doc(id).update(data);
            else await db.collection('categories').add(data);
            document.getElementById('categoryForm').reset();
            document.getElementById('catId').value = "";
            showToast('Category Updated');
        }

        function updateSelects() {
            ['prodCategory', 'editCategory'].forEach(id => {
                const el = document.getElementById(id);
                const currentVal = el.value;
                el.innerHTML = '<option value="">Select Category</option>' + categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
                el.value = currentVal;
            });
        }

        function updateSubSelect(prefix, selectedSub = "") {
            const catName = document.getElementById(`${prefix}Category`).value;
            const subEl = document.getElementById(`${prefix}SubCategory`);
            const cat = categories.find(c => c.name === catName);
            if(cat && cat.subs) {
                subEl.innerHTML = '<option value="">Sub-category</option>' + cat.subs.map(s => `<option value="${s}" ${s===selectedSub ? 'selected':''}>${s}</option>`).join('');
            } else { subEl.innerHTML = '<option value="">N/A</option>'; }
        }

        async function saveProduct() {
            const data = {
                name: document.getElementById('prodName').value,
                price: parseFloat(document.getElementById('prodPrice').value),
                unit: document.getElementById('prodUnit').value,
                category: document.getElementById('prodCategory').value,
                subCategory: document.getElementById('prodSubCategory').value,
                image: document.getElementById('prodImageUrl').value || 'https://via.placeholder.com/150',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection('products').add(data);
            document.getElementById('productForm').reset();
            showToast('Product Added');
        }

        async function updateProduct() {
            const id = document.getElementById('editId').value;
            await db.collection('products').doc(id).update({
                name: document.getElementById('editName').value,
                price: parseFloat(document.getElementById('editPrice').value),
                unit: document.getElementById('editUnit').value,
                category: document.getElementById('editCategory').value,
                subCategory: document.getElementById('editSubCategory').value,
                image: document.getElementById('editImageUrl').value
            });
            closeEditModal();
            showToast('Updated');
        }

        function renderProducts() {
            const q = document.getElementById('searchProducts').value.toLowerCase();
            const container = document.getElementById('productsList');
            const filtered = products.filter(p => p.name.toLowerCase().includes(q));
            container.innerHTML = filtered.map(p => `
                <div class="flex items-center gap-4 p-4 bg-white border rounded-2xl group">
                    <img src="${p.image}" class="w-12 h-12 object-cover rounded-xl">
                    <div class="flex-1">
                        <h4 class="font-bold text-sm text-gray-800">${p.name}</h4>
                        <span class="text-[9px] uppercase font-bold text-gray-400">${p.category} > ${p.subCategory}</span>
                    </div>
                    <div class="text-right mr-4 font-bold text-emerald-600">KSh ${p.price}</div>
                    <div class="flex gap-1">
                        <button onclick="openEditModal('${p.id}')" class="p-2 text-blue-600 bg-blue-50 rounded-lg"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProduct('${p.id}')" class="p-2 text-red-500 bg-red-50 rounded-lg"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`).join('');
        }

        function renderCategories() {
            document.getElementById('catAdminList').innerHTML = categories.map(c => `
                <div class="p-4 bg-gray-50 rounded-2xl border">
                    <div class="flex justify-between mb-2"><span class="font-bold">${c.name}</span><div class="flex gap-2"><button onclick="editCategory('${c.id}')" class="text-blue-500 text-xs">Edit</button><button onclick="deleteCategory('${c.id}')" class="text-red-400 text-xs">Delete</button></div></div>
                    <div class="flex flex-wrap gap-1">${(c.subs || []).map(s => `<span class="text-[8px] bg-white px-2 py-1 rounded border">#${s}</span>`).join('')}</div>
                </div>`).join('');
        }

        function editCategory(id) { const c = categories.find(x => x.id === id); document.getElementById('catId').value = c.id; document.getElementById('catName').value = c.name; document.getElementById('catSubs').value = (c.subs || []).join(', '); }
        function openEditModal(id) { const p = products.find(x => x.id === id); document.getElementById('editId').value = id; document.getElementById('editName').value = p.name; document.getElementById('editPrice').value = p.price; document.getElementById('editUnit').value = p.unit; document.getElementById('editCategory').value = p.category; updateSubSelect('edit', p.subCategory); document.getElementById('editImageUrl').value = p.image; document.getElementById('editModal').classList.remove('hidden'); }
        function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }
        function showToast(m) { const t = document.getElementById('toast'); document.getElementById('toastMessage').innerText = m; t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 3000); }
        function switchTab(tab) { document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(`view-${tab}`).classList.remove('hidden'); document.getElementById(`tab-${tab}`).classList.add('active'); }
        async function deleteProduct(id) { if(confirm('Delete?')) await db.collection('products').doc(id).delete(); }
        async function deleteCategory(id) { if(confirm('Delete?')) await db.collection('categories').doc(id).delete(); }
        
        // --- AI SCANNER OPTIMIZED ---
        async function handleAIUpload(e) {
            const files = Array.from(e.target.files); if(!files.length) return;
            document.getElementById('scanLoader').classList.remove('hidden');
            document.getElementById('aiReviewSection').classList.add('hidden');
            tempExtracted = [];

            // Reuse existing worker for speed
            await initOCR(); 

            for(let f of files) {
                const tempUrl = URL.createObjectURL(f);
                const { data: { text } } = await ocrWorker.recognize(f);
                
                const lines = text.split('\n');
                const priceRegex = /(.+?)\s+[\.\-\_]*\s*(\d{1,6}(?:\.\d{2})?)$/;
                
                lines.forEach(l => {
                    const match = l.match(priceRegex);
                    if(match && match[1].trim().length > 2) {
                        tempExtracted.push({ 
                            name: match[1].trim(), 
                            price: parseFloat(match[2]), 
                            category: categories.length > 0 ? categories[0].name : "General", 
                            subCategory: "General", 
                            unit: "pcs",
                            tempUrl: tempUrl,
                            file: f // Keep the actual file for database upload
                        });
                    }
                });
            }
            document.getElementById('scanLoader').classList.add('hidden');
            document.getElementById('aiReviewSection').classList.remove('hidden');
            renderAITable();
        }

        function renderAITable() {
            document.getElementById('detectedCount').innerText = tempExtracted.length;
            document.getElementById('aiResultsTable').innerHTML = tempExtracted.map((item, i) => `
                <tr class="border-b">
                    <td class="p-2"><img src="${item.tempUrl}" class="w-12 h-12 object-cover rounded-lg border"></td>
                    <td class="p-2"><input value="${item.name}" onchange="tempExtracted[${i}].name=this.value" class="w-full bg-transparent font-medium p-1"></td>
                    <td class="p-2"><input type="number" value="${item.price}" onchange="tempExtracted[${i}].price=parseFloat(this.value)" class="w-20 bg-transparent font-bold text-emerald-600 p-1"></td>
                    <td class="p-2">
                        <select onchange="tempExtracted[${i}].category=this.value" class="text-xs border rounded p-1">
                            ${categories.map(c => `<option value="${c.name}" ${item.category === c.name ? 'selected':''}>${c.name}</option>`).join('')}
                        </select>
                    </td>
                    <td class="p-2 text-red-500 cursor-pointer text-center" onclick="tempExtracted.splice(${i},1);renderAITable()"><i class="fas fa-trash"></i></td>
                </tr>`).join('');
        }

        async function saveAIScannedItems(btn) {
            const originalText = btn.innerText;
            btn.innerText = "Uploading & Saving...";
            btn.disabled = true;

            try {
                for (let item of tempExtracted) {
                    let finalUrl = 'https://via.placeholder.com/150';
                    
                    // Upload the specific item photo to Firebase Storage
                    if (item.file) {
                        const ref = storage.ref('products/scanned_' + Date.now() + '_' + Math.random().toString(36).substring(7));
                        const snapshot = await ref.put(item.file);
                        finalUrl = await snapshot.ref.getDownloadURL();
                    }

                    await db.collection('products').add({
                        name: item.name,
                        price: item.price,
                        category: item.category,
                        subCategory: item.subCategory,
                        unit: item.unit,
                        image: finalUrl,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                tempExtracted = [];
                document.getElementById('aiReviewSection').classList.add('hidden');
                showToast('Stock Updated with AI Data');
            } catch (e) {
                console.error(e);
                showToast('Error saving items');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
        
        async function downloadPriceListPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("Lwandeti Junction Minimart - Price List", 14, 15);
            const data = products.map(p => [p.name, p.category, `KSh ${p.price}`]);
            doc.autoTable({ head: [['Name', 'Category', 'Price']], body: data, startY: 20 });
            doc.save('PriceList.pdf');
        }
    </script>
</body>
</html>
