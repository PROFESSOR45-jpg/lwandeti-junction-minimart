<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Lwandeti Junction Minimart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .preview-img { max-width: 200px; max-height: 200px; object-fit: cover; }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-emerald-600 rounded-xl flex items-center justify-center text-white text-2xl mx-auto mb-4">
                    <i class="fas fa-lock"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">Admin Panel</h1>
                <p class="text-gray-500">Lwandeti Junction Minimart</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="password" placeholder="Enter password" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-emerald-500 focus:outline-none">
                <button onclick="login()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition">
                    Login
                </button>
                <p class="text-center text-sm text-gray-500">Default: admin123</p>
            </div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="hidden min-h-screen">
        <!-- Header -->
        <header class="bg-emerald-800 text-white shadow-lg">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center">
                        <i class="fas fa-cog"></i>
                    </div>
                    <div>
                        <h1 class="font-bold">Admin Dashboard</h1>
                        <p class="text-sm text-emerald-200">Manage Products</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <a href="index.html" target="_blank" class="px-4 py-2 bg-white/20 rounded-lg hover:bg-white/30 transition">
                        <i class="fas fa-external-link-alt mr-2"></i>View Site
                    </a>
                    <button onclick="logout()" class="px-4 py-2 bg-red-500 rounded-lg hover:bg-red-600 transition">
                        <i class="fas fa-sign-out-alt mr-2"></i>Logout
                    </button>
                </div>
            </div>
        </header>

        <div class="container mx-auto px-4 py-8">
            <div class="grid lg:grid-cols-3 gap-8">
                
                <!-- Add Product Form -->
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-2xl shadow-sm p-6 sticky top-4">
                        <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                            <i class="fas fa-plus-circle text-emerald-600"></i>
                            Add New Product
                        </h2>
                        
                        <form id="productForm" onsubmit="event.preventDefault(); saveProduct();" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Product Name *</label>
                                <input type="text" id="prodName" required class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-emerald-500 focus:outline-none" placeholder="e.g., Coca Cola 2L">
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Price (KSh) *</label>
                                    <input type="number" id="prodPrice" required min="1" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-emerald-500 focus:outline-none" placeholder="150">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Old Price</label>
                                    <input type="number" id="prodOldPrice" min="1" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-emerald-500 focus:outline-none" placeholder="200">
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Unit *</label>
                                <input type="text" id="prodUnit" required class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-emerald-500 focus:outline-none" placeholder="e.g., per bottle, per kg">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Category *</label>
                                <select id="prodCategory" required class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-emerald-500 focus:outline-none">
                                    <option value="">Select Category</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Badge</label>
                                <select id="prodBadge" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-emerald-500 focus:outline-none">
                                    <option value="">None</option>
                                    <option value="new">New</option>
                                    <option value="sale">Sale</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Product Image</label>
                                <div class="space-y-2">
                                    <input type="file" id="prodImageFile" accept="image/*" class="w-full text-sm" onchange="previewImage(this)">
                                    <p class="text-xs text-gray-500">Or use image URL:</p>
                                    <input type="url" id="prodImageUrl" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-emerald-500 focus:outline-none text-sm" placeholder="https://example.com/image.jpg" oninput="previewUrl(this.value)">
                                </div>
                                <div id="imagePreview" class="mt-2 hidden">
                                    <img id="previewImg" src="" class="preview-img rounded-lg border">
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                                <textarea id="prodDesc" rows="2" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:border-emerald-500 focus:outline-none" placeholder="Brief description..."></textarea>
                            </div>

                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="prodPopular" class="w-4 h-4 text-emerald-600 rounded">
                                <label for="prodPopular" class="text-sm text-gray-700">Mark as Popular</label>
                            </div>

                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="prodStock" checked class="w-4 h-4 text-emerald-600 rounded">
                                <label for="prodStock" class="text-sm text-gray-700">In Stock</label>
                            </div>

                            <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold hover:bg-emerald-700 transition flex items-center justify-center gap-2">
                                <i class="fas fa-save"></i> Save Product
                            </button>
                            
                            <button type="button" onclick="resetForm()" class="w-full bg-gray-200 text-gray-700 py-2 rounded-lg font-medium hover:bg-gray-300 transition">
                                Clear Form
                            </button>
                        </form>

                        <div class="mt-6 p-4 bg-yellow-50 rounded-lg border border-yellow-200">
                            <p class="text-sm text-yellow-800">
                                <i class="fas fa-info-circle mr-1"></i>
                                <strong>Note:</strong> In production, this would save to a database. For now, copy the generated JSON.
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Products List -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-2xl shadow-sm p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-bold flex items-center gap-2">
                                <i class="fas fa-list text-emerald-600"></i>
                                Current Products
                            </h2>
                            <div class="flex gap-2">
                                <select id="filterCategory" onchange="filterProducts()" class="px-4 py-2 rounded-lg border border-gray-300 text-sm">
                                    <option value="">All Categories</option>
                                </select>
                                <input type="text" id="searchProducts" placeholder="Search..." oninput="searchProductsList()" class="px-4 py-2 rounded-lg border border-gray-300 text-sm">
                            </div>
                        </div>

                        <div id="productsList" class="space-y-3 max-h-[600px] overflow-y-auto">
                            <!-- Products loaded here -->
                        </div>

                        <div class="mt-6 p-4 bg-gray-50 rounded-lg">
                            <h3 class="font-bold mb-2">Export Data</h3>
                            <button onclick="exportJSON()" class="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition mr-2">
                                <i class="fas fa-download mr-2"></i>Download products.json
                            </button>
                            <button onclick="copyToClipboard()" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
                                <i class="fas fa-copy mr-2"></i>Copy JSON
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">Edit Product</h3>
                <button onclick="closeEditModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="editForm" onsubmit="event.preventDefault(); updateProduct();" class="space-y-4">
                <input type="hidden" id="editId">
                <!-- Same fields as add form -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                    <input type="text" id="editName" required class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-emerald-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Price</label>
                        <input type="number" id="editPrice" required class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Old Price</label>
                        <input type="number" id="editOldPrice" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-emerald-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                    <select id="editCategory" required class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:border-emerald-500"></select>
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold hover:bg-emerald-700 transition">
                    Update Product
                </button>
            </form>
        </div>
    </div>

    <script>
        let products = [];
        let categories = [];
        let editingId = null;

        // Check for existing session
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            showDashboard();
        }

        function login() {
            const pwd = document.getElementById('password').value;
            if (pwd === 'admin123') {
                localStorage.setItem('adminLoggedIn', 'true');
                showDashboard();
            } else {
                alert('Wrong password!');
            }
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            loadData();
        }

        async function loadData() {
            try {
                const response = await fetch('data/products.json');
                const data = await response.json();
                products = data.products;
                categories = data.categories;
                
                populateCategories();
                renderProductsList();
            } catch (error) {
                console.error('Error loading data:', error);
                alert('Failed to load products data');
            }
        }

        function populateCategories() {
            const selects = ['prodCategory', 'editCategory', 'filterCategory'];
            selects.forEach(id => {
                const select = document.getElementById(id);
                if (!select) return;
                
                // Keep first option for some
                const firstOption = select.options[0];
                select.innerHTML = '';
                if (firstOption) select.appendChild(firstOption);
                
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = cat.name;
                    select.appendChild(option);
                });
            });
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('imagePreview').classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function previewUrl(url) {
            if (url) {
                document.getElementById('previewImg').src = url;
                document.getElementById('imagePreview').classList.remove('hidden');
            }
        }

        function saveProduct() {
            const newProduct = {
                id: Date.now(),
                name: document.getElementById('prodName').value,
                price: parseInt(document.getElementById('prodPrice').value),
                oldPrice: parseInt(document.getElementById('prodOldPrice').value) || null,
                unit: document.getElementById('prodUnit').value,
                category: document.getElementById('prodCategory').value,
                badge: document.getElementById('prodBadge').value,
                description: document.getElementById('prodDesc').value,
                popular: document.getElementById('prodPopular').checked,
                inStock: document.getElementById('prodStock').checked,
                image: document.getElementById('previewImg').src || getCategoryImage(document.getElementById('prodCategory').value)
            };

            products.push(newProduct);
            renderProductsList();
            resetForm();
            showToast('Product added! Remember to export JSON.');
        }

        function getCategoryImage(catId) {
            const cat = categories.find(c => c.id === catId);
            return cat ? cat.defaultProductImage : 'https://via.placeholder.com/400';
        }

        function renderProductsList(filtered = products) {
            const container = document.getElementById('productsList');
            
            if (filtered.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-8">No products found</p>';
                return;
            }

            container.innerHTML = filtered.map(p => {
                const cat = categories.find(c => c.id === p.category);
                return `
                    <div class="flex items-center gap-4 p-4 bg-gray-50 rounded-xl hover:bg-gray-100 transition">
                        <img src="${p.image}" class="w-16 h-16 object-cover rounded-lg flex-shrink-0">
                        <div class="flex-1 min-w-0">
                            <h4 class="font-semibold text-gray-900 truncate">${p.name}</h4>
                            <p class="text-sm text-gray-500">KSh ${p.price} ${p.oldPrice ? `<span class="line-through text-gray-400">KSh ${p.oldPrice}</span>` : ''} • ${cat?.name || p.category}</p>
                            ${p.badge ? `<span class="inline-block mt-1 px-2 py-0.5 ${p.badge === 'sale' ? 'bg-orange-100 text-orange-600' : 'bg-emerald-100 text-emerald-600'} text-xs rounded-full">${p.badge}</span>` : ''}
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editProduct(${p.id})" class="w-8 h-8 bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200 flex items-center justify-center">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteProduct(${p.id})" class="w-8 h-8 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 flex items-center justify-center">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            editingId = id;
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = product.name;
            document.getElementById('editPrice').value = product.price;
            document.getElementById('editOldPrice').value = product.oldPrice || '';
            document.getElementById('editCategory').value = product.category;
            
            document.getElementById('editModal').classList.remove('hidden');
        }

        function updateProduct() {
            const idx = products.findIndex(p => p.id === editingId);
            if (idx === -1) return;

            products[idx] = {
                ...products[idx],
                name: document.getElementById('editName').value,
                price: parseInt(document.getElementById('editPrice').value),
                oldPrice: parseInt(document.getElementById('editOldPrice').value) || null,
                category: document.getElementById('editCategory').value
            };

            renderProductsList();
            closeEditModal();
            showToast('Product updated!');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            editingId = null;
        }

        function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            products = products.filter(p => p.id !== id);
            renderProductsList();
            showToast('Product deleted');
        }

        function filterProducts() {
            const cat = document.getElementById('filterCategory').value;
            const filtered = cat ? products.filter(p => p.category === cat) : products;
            renderProductsList(filtered);
        }

        function searchProductsList() {
            const query = document.getElementById('searchProducts').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query));
            renderProductsList(filtered);
        }

        function resetForm() {
            document.getElementById('productForm').reset();
            document.getElementById('imagePreview').classList.add('hidden');
            document.getElementById('previewImg').src = '';
        }

        function exportJSON() {
            const data = {
                storeInfo: {
                    name: "Lwandeti Junction Minimart",
                    phone: "0117 352700",
                    whatsapp: "254117352700",
                    email: "junctionsupa@gmail.com",
                    address: "Lwandeti Junction, Kenya",
                    hours: "7:00 AM - 9:00 PM",
                    currency: "KSh"
                },
                categories: categories,
                products: products,
                lastUpdated: new Date().toISOString()
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'products.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function copyToClipboard() {
            const data = { storeInfo: { name: "Lwandeti Junction Minimart" }, categories, products, lastUpdated: new Date().toISOString() };
            navigator.clipboard.writeText(JSON.stringify(data, null, 2));
            showToast('JSON copied to clipboard!');
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg z-50';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
