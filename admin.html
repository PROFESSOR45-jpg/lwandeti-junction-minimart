<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Console | Lwandeti Junction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --green: #064e3b; --yellow: #fbbf24; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .sidebar { background: var(--green); }
        .nav-btn.active { background: rgba(255,255,255,0.1); border-left: 4px solid var(--yellow); }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="login" class="fixed inset-0 z-[100] bg-[#064e3b] flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2rem] w-full max-w-md text-center">
            <h1 class="text-2xl font-black mb-8">ADMIN ACCESS</h1>
            <input type="text" id="user" placeholder="Username" class="w-full p-4 border rounded-xl mb-4 outline-none focus:border-emerald-600">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 border rounded-xl mb-6 outline-none focus:border-emerald-600">
            <button onclick="doLogin()" class="w-full bg-[#064e3b] text-[#fbbf24] py-4 rounded-xl font-black uppercase">Verify</button>
        </div>
    </div>

    <aside id="mainSidebar" class="hidden w-72 sidebar text-white flex flex-col sticky top-0 h-screen">
        <div class="p-8 border-b border-white/10">
            <h1 class="text-xl font-black tracking-tighter">LWANDETI <span class="text-brand-yellow">HUB</span></h1>
        </div>
        <nav class="p-6 space-y-2 flex-1">
            <button onclick="tab('inventory')" id="b-inventory" class="nav-btn active w-full flex items-center gap-4 p-4 rounded-xl font-black text-[11px] uppercase tracking-widest transition">
                <i class="fas fa-boxes"></i> Inventory
            </button>
            <button onclick="tab('ai')" id="b-ai" class="nav-btn w-full flex items-center gap-4 p-4 rounded-xl font-black text-[11px] uppercase tracking-widest transition text-brand-yellow">
                <i class="fas fa-robot"></i> AI Mass Scan
            </button>
            <button onclick="tab('cats')" id="b-cats" class="nav-btn w-full flex items-center gap-4 p-4 rounded-xl font-black text-[11px] uppercase tracking-widest transition">
                <i class="fas fa-tags"></i> Departments
            </button>
        </nav>
        <button onclick="logout()" class="p-8 text-left text-red-400 font-black uppercase text-[10px]">Logout Session</button>
    </aside>

    <main id="mainContent" class="hidden flex-1 p-12">
        <div id="view-inventory">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black uppercase tracking-tighter">Inventory Manager</h2>
                <button onclick="exportPDF()" class="bg-white border p-3 rounded-xl font-bold text-xs uppercase"><i class="fas fa-file-pdf mr-2"></i>Export List</button>
            </div>
            <div class="grid grid-cols-3 gap-10">
                <div class="col-span-1 bg-white p-8 rounded-3xl border">
                    <h3 class="font-black uppercase text-xs mb-6">Quick Add Item</h3>
                    <input type="text" id="pName" placeholder="Item Name" class="w-full p-3 border rounded-lg mb-3">
                    <input type="number" id="pPrice" placeholder="Price" class="w-full p-3 border rounded-lg mb-3">
                    <select id="pCat" class="w-full p-3 border rounded-lg mb-6"></select>
                    <button onclick="addItem()" class="w-full bg-[#064e3b] text-white py-3 rounded-lg font-black uppercase">Save Product</button>
                </div>
                <div class="col-span-2 bg-white p-8 rounded-3xl border" id="pList"></div>
            </div>
        </div>

        <div id="view-ai" class="hidden">
            <div class="bg-white p-12 rounded-[2.5rem] shadow-sm text-center">
                <div class="border-4 border-dashed border-gray-100 rounded-[2rem] p-20 bg-gray-50 mb-10 cursor-pointer" onclick="document.getElementById('aiInput').click()">
                    <input type="file" id="aiInput" class="hidden" multiple>
                    <i class="fas fa-bolt text-4xl text-emerald-600 mb-4"></i>
                    <h3 class="text-2xl font-black uppercase tracking-tighter">Bulk Scanner Engine</h3>
                    <p class="text-gray-400 text-sm">Upload media to auto-generate inventory items.</p>
                </div>
                <div class="grid grid-cols-4 gap-4">
                    <div class="bg-gray-100 p-4 rounded-xl"><i class="fas fa-pen text-emerald-600 mb-2"></i><p class="text-[9px] font-black uppercase">Handwritten</p></div>
                    <div class="bg-gray-100 p-4 rounded-xl"><i class="fas fa-camera text-blue-600 mb-2"></i><p class="text-[9px] font-black uppercase">Photos</p></div>
                    <div class="bg-gray-100 p-4 rounded-xl"><i class="fas fa-receipt text-orange-600 mb-2"></i><p class="text-[9px] font-black uppercase">Receipts</p></div>
                    <div class="bg-gray-100 p-4 rounded-xl"><i class="fas fa-file-pdf text-red-600 mb-2"></i><p class="text-[9px] font-black uppercase">PDF Invoices</p></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Use previous firebaseConfig here
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function doLogin() {
            if(document.getElementById('user').value === 'ADMINISTRATOR' && document.getElementById('pass').value === 'admin123') {
                sessionStorage.setItem('auth', 'true');
                checkAuth();
            }
        }

        function checkAuth() {
            if(sessionStorage.getItem('auth')) {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('mainSidebar').classList.remove('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                sync();
            }
        }

        function logout() { sessionStorage.removeItem('auth'); location.reload(); }

        let products = [], categories = [];
        function sync() {
            db.collection('categories').onSnapshot(s => {
                categories = s.docs.map(d => d.data());
                document.getElementById('pCat').innerHTML = categories.map(c => `<option>${c.name}</option>`).join('');
            });
            db.collection('products').onSnapshot(s => {
                products = s.docs.map(d => ({id: d.id, ...d.data()}));
                render();
            });
        }

        function render() {
            document.getElementById('pList').innerHTML = products.map(p => `
                <div class="flex items-center justify-between border-b py-4">
                    <span class="font-black uppercase text-xs">${p.name}</span>
                    <span class="font-black text-emerald-700">KSh ${p.price}</span>
                    <button onclick="del('${p.id}')" class="text-red-400"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }

        async function addItem() {
            await db.collection('products').add({
                name: document.getElementById('pName').value,
                price: parseFloat(document.getElementById('pPrice').value),
                category: document.getElementById('pCat').value,
                image: 'https://via.placeholder.com/150',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert('Added');
        }

        function del(id) { if(confirm('Delete?')) db.collection('products').doc(id).delete(); }

        function tab(t) {
            document.querySelectorAll('main > div').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-'+t).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('b-'+t).classList.add('active');
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("Lwandeti Junction Price List", 14, 15);
            doc.autoTable({ head:[['Item', 'Price']], body: products.map(p => [p.name, p.price]), startY: 20 });
            doc.save('PriceList.pdf');
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
