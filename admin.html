<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Lwandeti Junction Minimart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .preview-img { max-width: 150px; max-height: 150px; object-fit: cover; border-radius: 8px; }
        .drop-zone { border: 3px dashed #cbd5e1; transition: all 0.3s; }
        .drop-zone.drag-over { border-color: #10b981; background-color: #ecfdf5; }
        .firebase-status.connected { background-color: #dcfce7; color: #166534; }
        .firebase-status.disconnected { background-color: #fee2e2; color: #991b1b; }
        .tab-btn.active { border-bottom: 3px solid #059669; color: #059669; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="toast" class="hidden fixed bottom-4 right-4 bg-gray-900 text-white px-6 py-3 rounded-xl shadow-lg z-50 flex items-center gap-3">
        <i class="fas fa-check-circle text-emerald-400"></i>
        <span id="toastMessage">Done</span>
    </div>

    <div id="loginScreen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
            <h1 class="text-2xl font-bold text-center mb-6 text-emerald-800">Minimart Admin</h1>
            <input type="password" id="password" placeholder="Admin Password" class="w-full px-4 py-3 rounded-xl border mb-4 outline-none">
            <button onclick="login()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">Login</button>
        </div>
    </div>

    <div id="adminDashboard" class="hidden min-h-screen">
        <header class="bg-emerald-800 text-white shadow-lg sticky top-0 z-40">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <h1 class="font-bold">Lwandeti Junction Panel</h1>
                    <div id="firebaseStatus" class="firebase-status disconnected px-3 py-0.5 rounded-full text-[10px] uppercase font-bold border">Offline</div>
                </div>
                <button onclick="logout()" class="text-xs opacity-70 hover:opacity-100">Logout</button>
            </div>
        </header>

        <div class="container mx-auto px-4 py-6">
            <div class="flex gap-6 border-b mb-6 overflow-x-auto">
                <button onclick="switchTab('inventory')" id="tab-inventory" class="tab-btn active pb-2 font-bold text-sm">Inventory</button>
                <button onclick="switchTab('categories')" id="tab-categories" class="tab-btn pb-2 font-bold text-sm">Manage Categories</button>
                <button onclick="switchTab('ai')" id="tab-ai" class="tab-btn pb-2 font-bold text-sm">AI Mass Upload</button>
            </div>

            <div id="view-inventory" class="tab-content">
                <div class="grid lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-emerald-500 sticky top-24">
                            <h2 class="font-bold mb-4">Add Product</h2>
                            <form id="productForm" onsubmit="event.preventDefault(); saveProduct();" class="space-y-3">
                                <input type="text" id="prodName" required placeholder="Product Name" class="w-full p-2 border rounded-lg text-sm">
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="number" id="prodPrice" required placeholder="Retail (KSh)" class="w-full p-2 border rounded-lg text-sm bg-emerald-50">
                                    <input type="number" id="prodWholesalePrice" placeholder="Wholesale" class="w-full p-2 border rounded-lg text-sm bg-blue-50">
                                </div>
                                <select id="prodCategory" required class="w-full p-2 border rounded-lg text-sm"></select>
                                <input type="text" id="prodUnit" required placeholder="Unit (e.g. 1kg)" class="w-full p-2 border rounded-lg text-sm">
                                
                                <div class="p-3 bg-gray-50 rounded-lg space-y-2">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Image Handling</label>
                                    <input type="url" id="prodImageUrl" placeholder="Paste Image URL here..." class="w-full p-2 text-xs border rounded-lg" oninput="previewHybrid('prod')">
                                    <div class="text-center text-[10px] text-gray-400">OR</div>
                                    <input type="file" id="prodImageFile" accept="image/*" class="text-xs w-full" onchange="previewHybrid('prod')">
                                    <div id="prodPreviewContainer" class="hidden pt-2"><img id="prodPreviewImg" class="preview-img mx-auto"></div>
                                </div>

                                <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">Save to Cloud</button>
                            </form>
                        </div>
                    </div>
                    <div class="lg:col-span-2">
                        <div class="bg-white p-6 rounded-2xl shadow-sm">
                            <div class="flex flex-col md:flex-row gap-4 mb-4">
                                <input type="text" id="searchProducts" placeholder="Search inventory..." oninput="filterItems()" class="flex-1 p-2 border rounded-lg text-sm">
                                <select id="filterCategory" onchange="filterItems()" class="p-2 border rounded-lg text-sm"></select>
                            </div>
                            <div id="productsList" class="space-y-2"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-categories" class="tab-content hidden">
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="bg-white p-6 rounded-2xl shadow-sm">
                        <h2 class="font-bold mb-4" id="catFormTitle">Create Category</h2>
                        <form id="categoryForm" onsubmit="event.preventDefault(); saveCategory();" class="space-y-3">
                            <input type="hidden" id="catId">
                            <input type="text" id="catName" required placeholder="Category Name (e.g. Beverages)" class="w-full p-2 border rounded-lg">
                            <input type="text" id="catKeywords" placeholder="Keywords (comma separated: milk,juice,soda)" class="w-full p-2 border rounded-lg text-sm">
                            <div class="flex gap-2">
                                <button type="submit" class="flex-1 bg-emerald-600 text-white py-2 rounded-lg font-bold">Save Category</button>
                                <button type="button" onclick="resetCatForm()" class="bg-gray-100 px-4 rounded-lg">Reset</button>
                            </div>
                        </form>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm">
                        <h2 class="font-bold mb-4">Live Categories</h2>
                        <div id="catAdminList" class="space-y-2"></div>
                    </div>
                </div>
            </div>

            <div id="view-ai" class="tab-content hidden">
                <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-purple-500">
                    <div id="dropZone" class="drop-zone rounded-2xl p-12 text-center cursor-pointer mb-6" onclick="document.getElementById('fileInput').click()">
                        <input type="file" id="fileInput" class="hidden" accept=".pdf,.png,.jpg,.jpeg" multiple onchange="handleFileSelect(event)">
                        <i class="fas fa-magic text-4xl text-purple-600 mb-2"></i>
                        <p class="font-bold">Scan Invoices or Price Lists</p>
                    </div>
                    <div id="extractedProducts" class="hidden">
                        <div id="extractedList" class="space-y-2 mb-6"></div>
                        <button onclick="confirmMassUpload()" class="w-full bg-purple-600 text-white py-4 rounded-xl font-bold">Upload Selected to Cloud</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="font-bold text-xl mb-4">Edit Product</h3>
            <form id="editForm" onsubmit="event.preventDefault(); updateProduct();" class="space-y-4">
                <input type="hidden" id="editId">
                <input type="text" id="editName" required class="w-full p-3 border rounded-lg">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="editPrice" required class="w-full p-3 border rounded-lg">
                    <input type="number" id="editWholesalePrice" class="w-full p-3 border rounded-lg">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="editCategory" required class="w-full p-3 border rounded-lg"></select>
                    <input type="text" id="editUnit" required class="w-full p-3 border rounded-lg">
                </div>
                <div class="p-3 bg-gray-50 rounded-lg space-y-2">
                    <label class="text-[10px] font-bold text-gray-400">Update Image</label>
                    <input type="url" id="editImageUrl" placeholder="Image URL..." class="w-full p-2 text-xs border rounded-lg" oninput="previewHybrid('edit')">
                    <input type="file" id="editImageFile" accept="image/*" class="text-xs w-full" onchange="previewHybrid('edit')">
                    <img id="editPreviewImg" class="preview-img mx-auto mt-2">
                </div>
                <div class="flex gap-2">
                    <button type="submit" class="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-bold">Update Inventory</button>
                    <button type="button" onclick="closeEditModal()" class="px-6 bg-gray-100 rounded-xl">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCi5xL9UmwubLlY0bn0Ae8TH4lG-9720oQ",
            authDomain: "lwandeti-junction-minimart.firebaseapp.com",
            projectId: "lwandeti-junction-minimart",
            storageBucket: "lwandeti-junction-minimart.firebasestorage.app",
            messagingSenderId: "282672112956",
            appId: "1:282672112956:web:1a85643cc1f3c410676a39",
            measurementId: "G-C3RV1N7D2N"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let products = [], categories = [], extractedItems = [];

        // Auth
        function login() {
            if (document.getElementById('password').value === 'admin123') {
                localStorage.setItem('adminLoggedIn', 'true');
                showDashboard();
            } else alert('Wrong password');
        }
        function logout() { localStorage.removeItem('adminLoggedIn'); location.reload(); }
        if (localStorage.getItem('adminLoggedIn') === 'true') showDashboard();

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            syncData();
        }

        // Real-time Sync
        function syncData() {
            // Sync Categories
            db.collection('categories').onSnapshot(snap => {
                categories = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderCategories();
                updateSelects();
            });
            // Sync Products
            db.collection('products').orderBy('name').onSnapshot(snap => {
                products = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderProducts();
            });
            // Sync Connectivity
            db.collection('.info/connected').onSnapshot(s => {
                const status = document.getElementById('firebaseStatus');
                status.className = `firebase-status ${s.data().connected ? 'connected' : 'disconnected'} px-3 py-0.5 rounded-full text-[10px] uppercase font-bold border`;
                status.innerText = s.data().connected ? 'Online' : 'Offline';
            });
        }

        // Category Logic
        async function saveCategory() {
            const id = document.getElementById('catId').value;
            const data = {
                name: document.getElementById('catName').value,
                keywords: document.getElementById('catKeywords').value.split(',').map(k => k.trim().toLowerCase())
            };
            if (id) await db.collection('categories').doc(id).update(data);
            else await db.collection('categories').add(data);
            resetCatForm();
            showToast('Category saved');
        }

        function editCategory(id) {
            const cat = categories.find(c => c.id === id);
            document.getElementById('catId').value = cat.id;
            document.getElementById('catName').value = cat.name;
            document.getElementById('catKeywords').value = cat.keywords.join(', ');
            document.getElementById('catFormTitle').innerText = "Edit Category";
            switchTab('categories');
        }

        async function deleteCategory(id) {
            if (confirm('Delete this category?')) await db.collection('categories').doc(id).delete();
        }

        function resetCatForm() {
            document.getElementById('categoryForm').reset();
            document.getElementById('catId').value = '';
            document.getElementById('catFormTitle').innerText = "Create Category";
        }

        // Product Logic
        async function saveProduct() {
            const file = document.getElementById('prodImageFile').files[0];
            const urlInput = document.getElementById('prodImageUrl').value;
            let finalImage = urlInput || 'https://via.placeholder.com/150';

            // If file exists, we simulate upload (or you can integrate Firebase Storage)
            // For this version, we prioritize URL if both exist, or use placeholder
            if (file) finalImage = await fileToDataUrl(file);

            const data = {
                name: document.getElementById('prodName').value,
                price: parseFloat(document.getElementById('prodPrice').value),
                wholesalePrice: parseFloat(document.getElementById('prodWholesalePrice').value) || null,
                category: document.getElementById('prodCategory').value,
                unit: document.getElementById('prodUnit').value,
                image: finalImage,
                inStock: true
            };
            await db.collection('products').add(data);
            document.getElementById('productForm').reset();
            document.getElementById('prodPreviewContainer').classList.add('hidden');
            showToast('Product Added');
        }

        async function updateProduct() {
            const id = document.getElementById('editId').value;
            const file = document.getElementById('editImageFile').files[0];
            const urlInput = document.getElementById('editImageUrl').value;
            let currentImage = document.getElementById('editPreviewImg').src;

            if (file) currentImage = await fileToDataUrl(file);
            else if (urlInput) currentImage = urlInput;

            await db.collection('products').doc(id).update({
                name: document.getElementById('editName').value,
                price: parseFloat(document.getElementById('editPrice').value),
                wholesalePrice: parseFloat(document.getElementById('editWholesalePrice').value) || null,
                category: document.getElementById('editCategory').value,
                unit: document.getElementById('editUnit').value,
                image: currentImage,
                popular: document.getElementById('editPopular').checked,
                inStock: document.getElementById('editStock').checked
            });
            closeEditModal();
            showToast('Inventory Updated');
        }

        // Helpers & UI
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        function previewHybrid(prefix) {
            const url = document.getElementById(`${prefix}ImageUrl`).value;
            const file = document.getElementById(`${prefix}ImageFile`).files[0];
            const img = document.getElementById(`${prefix}PreviewImg`);
            const container = document.getElementById(`${prefix}PreviewContainer`);

            if (file) {
                const reader = new FileReader();
                reader.onload = e => { img.src = e.target.result; if(container) container.classList.remove('hidden'); };
                reader.readAsDataURL(file);
            } else if (url) {
                img.src = url;
                if(container) container.classList.remove('hidden');
            }
        }

        function renderProducts(data = products) {
            const container = document.getElementById('productsList');
            container.innerHTML = data.map(p => `
                <div class="flex items-center gap-4 p-3 bg-white border rounded-xl">
                    <img src="${p.image}" class="w-12 h-12 object-cover rounded-md shadow-sm">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-sm truncate">${p.name}</h4>
                        <p class="text-[10px] text-gray-500 uppercase">${categories.find(c=>c.id===p.category)?.name || 'Misc'}</p>
                    </div>
                    <div class="text-right mr-4">
                        <p class="font-bold text-xs">KSh ${p.price}</p>
                        <p class="text-[9px] text-blue-500">WS: ${p.wholesalePrice || '-'}</p>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="openEditModal('${p.id}')" class="p-2 text-emerald-600"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProduct('${p.id}')" class="p-2 text-red-400"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderCategories() {
            const container = document.getElementById('catAdminList');
            container.innerHTML = categories.map(c => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                    <div>
                        <span class="font-bold text-sm">${c.name}</span>
                        <p class="text-[10px] text-gray-400">${c.keywords?.length || 0} keywords</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editCategory('${c.id}')" class="text-blue-500 text-xs">Edit</button>
                        <button onclick="deleteCategory('${c.id}')" class="text-red-500 text-xs">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function updateSelects() {
            ['prodCategory', 'editCategory', 'filterCategory'].forEach(id => {
                const el = document.getElementById(id);
                const current = el.value;
                el.innerHTML = (id === 'filterCategory' ? '<option value="">All Categories</option>' : '') + 
                               categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                el.value = current;
            });
        }

        function openEditModal(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = p.name;
            document.getElementById('editPrice').value = p.price;
            document.getElementById('editWholesalePrice').value = p.wholesalePrice || '';
            document.getElementById('editCategory').value = p.category;
            document.getElementById('editUnit').value = p.unit;
            document.getElementById('editPreviewImg').src = p.image;
            document.getElementById('editImageUrl').value = p.image.startsWith('http') ? p.image : '';
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }

        async function deleteProduct(id) {
            if(confirm('Delete product?')) await db.collection('products').doc(id).delete();
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = m;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        function fileToDataUrl(file) {
            return new Promise(r => { const reader = new FileReader(); reader.onload = e => r(e.target.result); reader.readAsDataURL(file); });
        }

        function filterItems() {
            const q = document.getElementById('searchProducts').value.toLowerCase();
            const c = document.getElementById('filterCategory').value;
            const filtered = products.filter(p => {
                const matchQ = p.name.toLowerCase().includes(q);
                const matchC = !c || p.category === c;
                return matchQ && matchC;
            });
            renderProducts(filtered);
        }

        // Mass Upload OCR (Uses dynamic categories)
        async function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            extractedItems = [];
            for(const f of files) {
                const res = await Tesseract.recognize(await fileToDataUrl(f), 'eng');
                const lines = res.data.text.split('\n');
                lines.forEach(l => {
                    const m = l.match(/(.+?)\s+(\d{2,})/);
                    if(m && m[1].length > 2) {
                        const name = m[1].trim();
                        const price = parseFloat(m[2]);
                        const cat = categories.find(c => c.keywords.some(k => name.toLowerCase().includes(k)))?.id || 'other';
                        extractedItems.push({ name, price, category: cat, unit: 'pcs', image: 'https://via.placeholder.com/150', selected: true });
                    }
                });
            }
            renderExtracted();
        }

        function renderExtracted() {
            const cont = document.getElementById('extractedList');
            cont.innerHTML = extractedItems.map((p, i) => `
                <div class="flex items-center gap-3 p-2 bg-gray-50 border rounded-lg text-xs">
                    <input type="checkbox" checked onchange="extractedItems[${i}].selected = this.checked">
                    <input type="text" value="${p.name}" class="flex-1 bg-transparent border-b" onchange="extractedItems[${i}].name = this.value">
                    <input type="number" value="${p.price}" class="w-12 border rounded" onchange="extractedItems[${i}].price = this.value">
                    <select class="text-[9px] border rounded" onchange="extractedItems[${i}].category = this.value">
                        ${categories.map(c => `<option value="${c.id}" ${c.id === p.category ? 'selected' : ''}>${c.name}</option>`).join('')}
                    </select>
                </div>
            `).join('');
            document.getElementById('extractedProducts').classList.remove('hidden');
        }

        async function confirmMassUpload() {
            const sel = extractedItems.filter(p => p.selected);
            const batch = db.batch();
            sel.forEach(p => {
                const ref = db.collection('products').doc();
                const {selected, ...data} = p;
                batch.set(ref, data);
            });
            await batch.commit();
            extractedItems = [];
            document.getElementById('extractedProducts').classList.add('hidden');
            showToast('Mass upload synced');
        }
    </script>
</body>
</html>
