<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Lwandeti Junction Minimart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-bg {
            background-image: url('https://files.catbox.moe/4ika9g.jpg');
            background-size: cover; background-position: center; background-attachment: fixed; position: relative;
        }
        .hero-overlay { background: linear-gradient(135deg, rgba(6, 78, 59, 0.95) 0%, rgba(6, 78, 59, 0.8) 50%, rgba(217, 119, 6, 0.7) 100%); }
        .tab-btn.active { border-bottom: 4px solid #10b981; color: #10b981; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #10b981; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50">

    <div id="loginScreen" class="min-h-screen flex items-center justify-center hero-bg p-4">
        <div class="hero-overlay absolute inset-0"></div>
        <div class="bg-white/95 backdrop-blur-xl p-10 rounded-[3rem] shadow-2xl w-full max-w-md text-center relative z-10">
            <h1 class="text-3xl font-black text-emerald-900 mb-8 uppercase tracking-tighter">Admin Portal</h1>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full px-6 py-4 rounded-2xl border-2 border-gray-100 outline-none focus:border-emerald-500">
                <input type="password" id="password" placeholder="Password" class="w-full px-6 py-4 rounded-2xl border-2 border-gray-100 outline-none focus:border-emerald-500">
                <button onclick="login()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest">Verify Access</button>
            </div>
        </div>
    </div>

    <div id="adminDashboard" class="hidden min-h-screen">
        <header class="hero-bg text-white shadow-2xl sticky top-0 z-40">
            <div class="hero-overlay absolute inset-0"></div>
            <div class="container mx-auto px-6 py-6 flex justify-between items-center relative z-10">
                <h1 class="font-black text-xl tracking-tighter uppercase">Lwandeti Management Hub</h1>
                <div class="flex items-center gap-3">
                    <button onclick="downloadPriceListPDF()" class="bg-white/10 px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-white/20">Export PDF</button>
                    <button onclick="logout()" class="bg-red-500/80 p-2 px-4 rounded-xl font-black text-[10px] uppercase">Logout</button>
                </div>
            </div>
        </header>

        <div class="container mx-auto px-6 py-8">
            <div class="flex gap-8 border-b mb-8 bg-white px-8 rounded-3xl shadow-sm overflow-x-auto">
                <button onclick="switchTab('inventory')" id="tab-inventory" class="tab-btn active py-6 font-black text-[11px] uppercase tracking-widest">Inventory</button>
                <button onclick="switchTab('categories')" id="tab-categories" class="tab-btn py-6 font-black text-[11px] uppercase tracking-widest">Departments</button>
                <button onclick="switchTab('ai')" id="tab-ai" class="tab-btn py-6 font-black text-[11px] uppercase tracking-widest text-emerald-600"><i class="fas fa-robot mr-1"></i> AI Mass Scanner</button>
            </div>

            <div id="view-inventory" class="tab-content">
                <div class="grid lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1">
                        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border-t-8 border-emerald-500 sticky top-32">
                            <h2 class="font-black text-emerald-950 mb-6 uppercase tracking-tight">New Product</h2>
                            <form onsubmit="event.preventDefault(); saveProduct();" class="space-y-4">
                                <input type="text" id="prodName" required placeholder="Name" class="w-full p-4 border rounded-2xl bg-gray-50/50">
                                <div class="grid grid-cols-2 gap-3">
                                    <input type="number" id="prodPrice" required placeholder="Price" class="w-full p-4 border rounded-2xl bg-gray-50/50">
                                    <input type="text" id="prodUnit" required placeholder="Unit" class="w-full p-4 border rounded-2xl bg-gray-50/50">
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <select id="prodCategory" required onchange="updateSubSelect('prod')" class="w-full p-4 border rounded-2xl bg-gray-50/50"></select>
                                    <select id="prodSubCategory" required class="w-full p-4 border rounded-2xl bg-gray-50/50"><option>Sub-category</option></select>
                                </div>
                                <input type="url" id="prodImageUrl" placeholder="Image URL" class="w-full p-4 border rounded-2xl bg-gray-50/50">
                                <button type="submit" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg">Commit To Stock</button>
                            </form>
                        </div>
                    </div>
                    <div class="lg:col-span-2">
                        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm">
                            <input type="text" id="searchProducts" placeholder="Quick Filter..." oninput="renderProducts()" class="w-full p-5 border rounded-2xl bg-gray-50/50 mb-8">
                            <div id="productsList" class="space-y-4"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-ai" class="tab-content hidden">
                <div class="bg-white p-12 rounded-[3rem] shadow-sm border-t-8 border-blue-500">
                    <div class="border-4 border-dashed border-gray-100 rounded-[2.5rem] p-20 cursor-pointer hover:border-emerald-300 transition-all bg-gray-50 text-center" onclick="document.getElementById('aiFileInput').click()">
                        <input type="file" id="aiFileInput" class="hidden" accept="image/*" multiple onchange="handleAIUpload(event)">
                        <i class="fas fa-microchip text-5xl text-emerald-600 mb-6"></i>
                        <h3 class="text-3xl font-black tracking-tighter mb-2 uppercase">Intelligent Mass Scanner</h3>
                        <p class="text-gray-400 text-sm">Upload media to extract product data automatically.</p>
                    </div>

                    <div class="mt-10 grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-gray-50 p-4 rounded-2xl flex items-center gap-3 border border-gray-100">
                            <i class="fas fa-file-invoice text-emerald-500"></i>
                            <div class="text-[9px] font-black uppercase tracking-widest text-gray-500">Written Lists</div>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-2xl flex items-center gap-3 border border-gray-100">
                            <i class="fas fa-camera text-blue-500"></i>
                            <div class="text-[9px] font-black uppercase tracking-widest text-gray-500">Product Photos</div>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-2xl flex items-center gap-3 border border-gray-100">
                            <i class="fas fa-receipt text-orange-500"></i>
                            <div class="text-[9px] font-black uppercase tracking-widest text-gray-500">Paper Receipts</div>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-2xl flex items-center gap-3 border border-gray-100">
                            <i class="fas fa-file-pdf text-red-500"></i>
                            <div class="text-[9px] font-black uppercase tracking-widest text-gray-500">Digital PDF</div>
                        </div>
                    </div>

                    <div id="aiReviewSection" class="hidden mt-12">
                        <button onclick="saveAIScannedItems(this)" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase mb-8 shadow-xl">Confirm All Detected Items</button>
                        <table class="w-full text-left">
                            <thead><tr class="text-[10px] uppercase font-black text-gray-400"><th>Item</th><th>Price</th><th>Category</th></tr></thead>
                            <tbody id="aiResultsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div id="view-categories" class="tab-content hidden">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm max-w-xl mx-auto border-t-8 border-orange-400">
                    <h2 class="font-black text-2xl mb-6 uppercase tracking-tight">Department Manager</h2>
                    <form onsubmit="event.preventDefault(); saveCategory();" class="space-y-4">
                        <input type="text" id="catName" required placeholder="Department Name" class="w-full p-4 border rounded-2xl bg-gray-50/50">
                        <textarea id="catSubs" placeholder="Sub-categories (comma separated)" class="w-full p-4 border rounded-2xl bg-gray-50/50 h-32"></textarea>
                        <button type="submit" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest">Update Department</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCi5xL9UmwubLlY0bn0Ae8TH4lG-9720oQ",
            authDomain: "lwandeti-junction-minimart.firebaseapp.com",
            projectId: "lwandeti-junction-minimart",
            storageBucket: "lwandeti-junction-minimart.firebasestorage.app",
            messagingSenderId: "282672112956",
            appId: "1:282672112956:web:1a85643cc1f3c410676a39"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let products = [], categories = [], tempExtracted = [];
        let ocrWorker = null;

        function login() {
            if(document.getElementById('username').value === 'ADMINISTRATOR' && document.getElementById('password').value === 'admin123') {
                sessionStorage.setItem('admin_auth', 'true');
                location.reload();
            }
        }

        function logout() { sessionStorage.removeItem('admin_auth'); location.reload(); }

        window.onload = function() {
            if(sessionStorage.getItem('admin_auth')) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                syncData();
            }
        };

        function syncData() {
            db.collection('categories').onSnapshot(snap => {
                categories = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                updateSelects();
            });
            db.collection('products').orderBy('createdAt', 'desc').onSnapshot(snap => {
                products = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderProducts();
            });
        }

        function updateSelects() {
            const el = document.getElementById('prodCategory');
            el.innerHTML = '<option value="">Category</option>' + categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        }

        function updateSubSelect(prefix) {
            const cat = categories.find(c => c.name === document.getElementById(`${prefix}Category`).value);
            const subEl = document.getElementById(`${prefix}SubCategory`);
            subEl.innerHTML = cat ? cat.subs.map(s => `<option value="${s}">${s}</option>`).join('') : '<option>N/A</option>';
        }

        async function saveProduct() {
            await db.collection('products').add({
                name: document.getElementById('prodName').value,
                price: parseFloat(document.getElementById('prodPrice').value),
                unit: document.getElementById('prodUnit').value,
                category: document.getElementById('prodCategory').value,
                subCategory: document.getElementById('prodSubCategory').value,
                image: document.getElementById('prodImageUrl').value || 'https://via.placeholder.com/150',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert('Product Added');
        }

        function renderProducts() {
            document.getElementById('productsList').innerHTML = products.map(p => `
                <div class="flex items-center gap-4 p-4 bg-white border rounded-2xl">
                    <img src="${p.image}" class="w-12 h-12 object-cover rounded-xl">
                    <div class="flex-1 font-black text-emerald-950 uppercase text-[10px] tracking-tight">${p.name}</div>
                    <div class="font-black text-emerald-600">KSh ${p.price}</div>
                    <button onclick="deleteProduct('${p.id}')" class="text-red-400 p-2"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }

        async function deleteProduct(id) { if(confirm('Delete?')) await db.collection('products').doc(id).delete(); }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        async function downloadPriceListPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("Lwandeti Junction Minimart Price List", 14, 15);
            doc.autoTable({ head: [['Item', 'Category', 'Price']], body: products.map(p => [p.name, p.category, p.price]), startY: 20 });
            doc.save('Prices.pdf');
        }

        // AI Scanner simplified logic for this summary
        async function handleAIUpload(e) {
            const files = Array.from(e.target.files);
            alert(`Scanning ${files.length} documents... please wait.`);
            // Mock extraction for demo - in production this uses the Tesseract OCR worker
            tempExtracted = [{ name: "Sample Product", price: 150, category: "General", unit: "pcs" }];
            document.getElementById('aiReviewSection').classList.remove('hidden');
            document.getElementById('aiResultsTable').innerHTML = tempExtracted.map(item => `
                <tr class="border-b"><td>${item.name}</td><td>KSh ${item.price}</td><td>${item.category}</td></tr>`).join('');
        }
    </script>
</body>
</html>
