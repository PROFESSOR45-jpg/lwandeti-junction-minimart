<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Lwandeti Junction Minimart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-btn.active { border-bottom: 3px solid #059669; color: #059669; }
        .preview-img { max-width: 100px; max-height: 100px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="toast" class="hidden fixed bottom-4 right-4 bg-gray-900 text-white px-6 py-3 rounded-xl shadow-lg z-50 flex items-center gap-3">
        <i id="toastIcon" class="fas fa-check-circle text-emerald-400"></i>
        <span id="toastMessage">Done</span>
    </div>

    <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-emerald-900 p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md">
            <h1 class="text-2xl font-bold text-center mb-6">Admin Access</h1>
            <input type="password" id="password" placeholder="Password" class="w-full px-5 py-4 rounded-2xl border-2 mb-4 outline-none focus:border-emerald-500">
            <button onclick="login()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold">Login</button>
        </div>
    </div>

    <div id="adminDashboard" class="hidden min-h-screen">
        <header class="bg-emerald-800 text-white p-4 sticky top-0 z-40">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="font-bold">LWANDETI ADMIN</h1>
                <button onclick="logout()" class="bg-red-500 p-2 rounded-lg"><i class="fas fa-lock"></i></button>
            </div>
        </header>

        <div class="container mx-auto px-4 py-6">
            <div class="flex gap-6 border-b mb-6 bg-white px-4 rounded-t-xl overflow-x-auto">
                <button onclick="switchTab('inventory')" id="tab-inventory" class="tab-btn active py-4 font-bold text-sm">Inventory</button>
                <button onclick="switchTab('categories')" id="tab-categories" class="tab-btn py-4 font-bold text-sm">Category Manager</button>
            </div>

            <div id="view-inventory" class="tab-content">
                <div class="grid lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-emerald-500">
                            <h2 class="font-bold mb-4">Add New Product</h2>
                            <form id="productForm" onsubmit="event.preventDefault(); saveProduct();" class="space-y-3">
                                <input type="text" id="prodName" required placeholder="Product Name" class="w-full p-3 border rounded-xl text-sm">
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="number" id="prodPrice" required placeholder="Price" class="w-full p-3 border rounded-xl text-sm">
                                    <input type="text" id="prodUnit" required placeholder="Unit (kg, ml)" class="w-full p-3 border rounded-xl text-sm">
                                </div>
                                <select id="prodCategory" required onchange="updateSubSelect('prod')" class="w-full p-3 border rounded-xl text-sm"></select>
                                <select id="prodSubCategory" required class="w-full p-3 border rounded-xl text-sm">
                                    <option value="">Select Sub-category</option>
                                </select>
                                <input type="url" id="prodImageUrl" placeholder="Image URL" class="w-full p-3 border rounded-xl text-sm">
                                <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">Add Product</button>
                            </form>
                        </div>
                    </div>

                    <div class="lg:col-span-2">
                        <div class="bg-white p-6 rounded-2xl shadow-sm">
                            <input type="text" id="searchProducts" placeholder="Search..." oninput="renderProducts()" class="w-full p-3 border rounded-xl mb-4">
                            <div id="productsList" class="space-y-2"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-categories" class="tab-content hidden">
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="bg-white p-6 rounded-2xl shadow-sm">
                        <h2 class="font-bold text-lg mb-4">Add/Edit Category</h2>
                        <form id="categoryForm" onsubmit="event.preventDefault(); saveCategory();" class="space-y-4">
                            <input type="hidden" id="catId">
                            <input type="text" id="catName" required placeholder="Category Name (e.g. Beverages)" class="w-full p-3 border rounded-xl">
                            <div>
                                <label class="text-xs font-bold text-gray-400">SUB-CATEGORIES (Comma separated)</label>
                                <textarea id="catSubs" placeholder="Soda, Juice, Water, Energy Drinks" class="w-full p-3 border rounded-xl h-24"></textarea>
                            </div>
                            <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">Save Category Structure</button>
                        </form>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm">
                        <h2 class="font-bold mb-4">Current Structure</h2>
                        <div id="catAdminList" class="space-y-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-lg w-full p-8 shadow-2xl">
            <h3 class="font-bold text-xl mb-4">Edit Product</h3>
            <form id="editForm" onsubmit="event.preventDefault(); updateProduct();" class="space-y-4">
                <input type="hidden" id="editId">
                <input type="text" id="editName" required class="w-full p-3 border rounded-xl">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="editPrice" required class="w-full p-3 border rounded-xl">
                    <input type="text" id="editUnit" required class="w-full p-3 border rounded-xl">
                </div>
                <select id="editCategory" required onchange="updateSubSelect('edit')" class="w-full p-3 border rounded-xl"></select>
                <select id="editSubCategory" required class="w-full p-3 border rounded-xl"></select>
                <div class="flex gap-2">
                    <button type="submit" class="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-bold">Update</button>
                    <button type="button" onclick="closeEditModal()" class="px-6 bg-gray-200 rounded-xl">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCi5xL9UmwubLlY0bn0Ae8TH4lG-9720oQ",
            authDomain: "lwandeti-junction-minimart.firebaseapp.com",
            projectId: "lwandeti-junction-minimart",
            storageBucket: "lwandeti-junction-minimart.firebasestorage.app",
            messagingSenderId: "282672112956",
            appId: "1:282672112956:web:1a85643cc1f3c410676a39"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let products = [], categories = [];

        // --- AUTH ---
        function login() {
            if(document.getElementById('password').value === 'admin123') {
                sessionStorage.setItem('admin_auth', 'true');
                showDashboard();
            }
        }
        function logout() { sessionStorage.clear(); location.reload(); }
        if(sessionStorage.getItem('admin_auth')) showDashboard();

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            loadData();
        }

        // --- DATA LOADING ---
        function loadData() {
            db.collection('categories').onSnapshot(snap => {
                categories = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // If empty, seed initial data
                if(categories.length === 0) seedCategories();
                renderCategories();
                updateCategorySelects();
            });
            db.collection('products').onSnapshot(snap => {
                products = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderProducts();
            });
        }

        async function seedCategories() {
            const initial = [
                { name: "Food", subs: ["Grains", "Spices", "Snacks", "Bakery", "Canned Goods"] },
                { name: "Beverages", subs: ["Soft Drinks", "Water", "Juice", "Milk", "Tea & Coffee"] },
                { name: "Household", subs: ["Detergents", "Cleaning Tools", "Toiletries", "Kitchenware"] },
                { name: "Personal Care", subs: ["Skincare", "Haircare", "Oral Care", "Deodorants"] }
            ];
            for(let cat of initial) { await db.collection('categories').add(cat); }
        }

        // --- UI RENDERING ---
        function renderProducts() {
            const q = document.getElementById('searchProducts').value.toLowerCase();
            const container = document.getElementById('productsList');
            const filtered = products.filter(p => p.name.toLowerCase().includes(q));
            
            container.innerHTML = filtered.map(p => `
                <div class="flex items-center gap-4 p-3 bg-white border rounded-xl hover:shadow-md transition">
                    <img src="${p.image || 'https://via.placeholder.com/50'}" class="w-12 h-12 object-cover rounded-lg">
                    <div class="flex-1">
                        <h4 class="font-bold text-sm">${p.name}</h4>
                        <p class="text-[10px] text-gray-400 uppercase font-bold">${p.category} > ${p.subCategory || 'General'}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-emerald-600">KSh ${p.price}</p>
                        <div class="flex gap-2 mt-1">
                            <button onclick="openEditModal('${p.id}')" class="text-blue-500 text-xs"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteProduct('${p.id}')" class="text-red-400 text-xs"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderCategories() {
            const container = document.getElementById('catAdminList');
            container.innerHTML = categories.map(c => `
                <div class="p-4 bg-gray-50 rounded-xl border">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold text-emerald-800">${c.name}</h4>
                        <div class="flex gap-3">
                            <button onclick="editCategory('${c.id}')" class="text-blue-600 text-xs font-bold">Edit</button>
                            <button onclick="deleteCategory('${c.id}')" class="text-red-500 text-xs font-bold">Delete</button>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        ${(c.subs || []).map(s => `<span class="bg-white px-2 py-1 rounded-md border text-[10px] text-gray-500">${s}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        // --- LOGIC: CATEGORY & SUB-CATEGORY ---
        function updateCategorySelects() {
            const selects = ['prodCategory', 'editCategory'];
            selects.forEach(id => {
                const el = document.getElementById(id);
                el.innerHTML = '<option value="">Select Category</option>' + 
                               categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            });
        }

        function updateSubSelect(prefix, selectedSub = "") {
            const catName = document.getElementById(`${prefix}Category`).value;
            const subEl = document.getElementById(`${prefix}SubCategory`);
            const category = categories.find(c => c.name === catName);
            
            if (category && category.subs) {
                subEl.innerHTML = '<option value="">Select Sub-category</option>' + 
                                  category.subs.map(s => `<option value="${s}" ${s === selectedSub ? 'selected' : ''}>${s}</option>`).join('');
            } else {
                subEl.innerHTML = '<option value="">N/A</option>';
            }
        }

        // --- CRUD OPERATIONS ---
        async function saveCategory() {
            const id = document.getElementById('catId').value;
            const name = document.getElementById('catName').value;
            const subs = document.getElementById('catSubs').value.split(',').map(s => s.trim()).filter(s => s !== "");
            
            const data = { name, subs };
            if(id) await db.collection('categories').doc(id).update(data);
            else await db.collection('categories').add(data);
            
            document.getElementById('categoryForm').reset();
            document.getElementById('catId').value = "";
            showToast("Category Updated");
        }

        function editCategory(id) {
            const c = categories.find(x => x.id === id);
            document.getElementById('catId').value = c.id;
            document.getElementById('catName').value = c.name;
            document.getElementById('catSubs').value = (c.subs || []).join(', ');
            switchTab('categories');
        }

        async function saveProduct() {
            const data = {
                name: document.getElementById('prodName').value,
                price: parseFloat(document.getElementById('prodPrice').value),
                unit: document.getElementById('prodUnit').value,
                category: document.getElementById('prodCategory').value,
                subCategory: document.getElementById('prodSubCategory').value,
                image: document.getElementById('prodImageUrl').value || 'https://via.placeholder.com/150'
            };
            await db.collection('products').add(data);
            document.getElementById('productForm').reset();
            showToast("Product Added");
        }

        function openEditModal(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('editId').value = p.id;
            document.getElementById('editName').value = p.name;
            document.getElementById('editPrice').value = p.price;
            document.getElementById('editUnit').value = p.unit;
            document.getElementById('editCategory').value = p.category;
            updateSubSelect('edit', p.subCategory);
            document.getElementById('editModal').classList.remove('hidden');
        }

        async function updateProduct() {
            const id = document.getElementById('editId').value;
            await db.collection('products').doc(id).update({
                name: document.getElementById('editName').value,
                price: parseFloat(document.getElementById('editPrice').value),
                unit: document.getElementById('editUnit').value,
                category: document.getElementById('editCategory').value,
                subCategory: document.getElementById('editSubCategory').value
            });
            closeEditModal();
            showToast("Product Updated");
        }

        // --- HELPERS ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }
        function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }
        async function deleteProduct(id) { if(confirm('Delete?')) await db.collection('products').doc(id).delete(); }
        async function deleteCategory(id) { if(confirm('Delete category?')) await db.collection('categories').doc(id).delete(); }
        function showToast(m) {
            const t = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = m;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
