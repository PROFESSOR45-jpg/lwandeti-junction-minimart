<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Lwandeti Junction Minimart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .preview-img { max-width: 150px; border-radius: 8px; margin-top: 10px; }
        .drop-zone { border: 2px dashed #cbd5e1; transition: 0.3s; }
        .drop-zone.drag-over { border-color: #10b981; background: #ecfdf5; }
        .sync-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="toast" class="hidden fixed bottom-5 right-5 bg-gray-900 text-white px-6 py-3 rounded-xl shadow-2xl z-50 flex items-center gap-3">
        <i class="fas fa-cloud-upload-alt text-emerald-400"></i>
        <span id="toastMessage">Syncing...</span>
    </div>

    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
            <div class="w-16 h-16 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-2xl mx-auto mb-4 shadow-lg">
                <i class="fas fa-store"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Minimart Admin</h1>
            <p class="text-gray-500 mb-6 text-sm">Lwandeti Junction Cloud Access</p>
            <input type="password" id="password" placeholder="Admin Password" class="w-full px-4 py-3 rounded-xl border mb-4 focus:ring-2 focus:ring-emerald-500 outline-none">
            <button onclick="login()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition-all">Login</button>
        </div>
    </div>

    <div id="adminDashboard" class="hidden min-h-screen">
        <header class="bg-emerald-900 text-white p-4 shadow-md sticky top-0 z-40">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-white/10 p-2 rounded-lg"><i class="fas fa-terminal"></i></div>
                    <div>
                        <h1 class="font-bold text-lg">Lwandeti Junction</h1>
                        <p class="text-xs text-emerald-300 flex items-center gap-1">
                            <span id="statusDot" class="w-2 h-2 rounded-full bg-red-500"></span> 
                            <span id="statusText">Connecting...</span>
                        </p>
                    </div>
                </div>
                <button onclick="logout()" class="text-sm bg-red-500/20 hover:bg-red-500 px-4 py-2 rounded-lg transition-colors">Logout</button>
            </div>
        </header>

        <main class="container mx-auto px-4 py-8 grid lg:grid-cols-3 gap-8">
            
            <section class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-sm border p-6 sticky top-24">
                    <h2 class="text-xl font-bold mb-6 text-gray-800 flex items-center gap-2">
                        <i class="fas fa-plus-circle text-emerald-600"></i> New Product
                    </h2>
                    <form id="productForm" onsubmit="event.preventDefault(); saveProduct();" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Name</label>
                            <input type="text" id="prodName" required class="w-full px-4 py-2 rounded-lg border focus:border-emerald-500 outline-none transition-all">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Retail (KSh)</label>
                                <input type="number" id="prodPrice" required class="w-full px-4 py-2 rounded-lg border focus:border-emerald-500 outline-none bg-emerald-50/30">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Wholesale</label>
                                <input type="number" id="prodWholesalePrice" class="w-full px-4 py-2 rounded-lg border focus:border-emerald-500 outline-none bg-blue-50/30">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Category</label>
                            <select id="prodCategory" required class="w-full px-4 py-2 rounded-lg border focus:border-emerald-500 outline-none"></select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Unit (e.g., per kg)</label>
                            <input type="text" id="prodUnit" required placeholder="per packet" class="w-full px-4 py-2 rounded-lg border outline-none">
                        </div>
                        
                        <div class="flex items-center gap-4 py-2">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="prodPopular" class="w-4 h-4 rounded text-emerald-600">
                                <span class="text-sm font-medium">Popular Item</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" id="prodStock" checked class="w-4 h-4 rounded text-emerald-600">
                                <span class="text-sm font-medium">In Stock</span>
                            </label>
                        </div>

                        <button type="submit" id="saveBtn" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:shadow-lg transition-all flex items-center justify-center gap-2">
                            <i class="fas fa-save"></i> Save to Cloud
                        </button>
                    </form>
                </div>
            </section>

            <section class="lg:col-span-2 space-y-6">
                <div class="bg-white p-4 rounded-xl shadow-sm border flex flex-col md:flex-row gap-4 justify-between items-center">
                    <div class="relative w-full md:w-64">
                        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                        <input type="text" id="searchInput" oninput="filterItems()" placeholder="Search products..." class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="exportData()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-200"><i class="fas fa-download mr-1"></i> Export JSON</button>
                    </div>
                </div>

                <div id="productsList" class="grid gap-3">
                    <div class="text-center py-20 bg-white rounded-2xl border">
                        <i class="fas fa-sync sync-spinner text-3xl text-emerald-500 mb-2"></i>
                        <p class="text-gray-500">Synchronizing with Cloud Database...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Update Product</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="editForm" onsubmit="event.preventDefault(); updateProduct();" class="space-y-4">
                <input type="hidden" id="editId">
                <input type="text" id="editName" required class="w-full p-3 border rounded-xl" placeholder="Name">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="editPrice" required class="p-3 border rounded-xl" placeholder="Retail">
                    <input type="number" id="editWholesalePrice" class="p-3 border rounded-xl" placeholder="Wholesale">
                </div>
                <select id="editCategory" class="w-full p-3 border rounded-xl"></select>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">Update Cloud Data</button>
            </form>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCi5xL9UmwubLlY0bn0Ae8TH4lG-9720oQ",
            authDomain: "lwandeti-junction-minimart.firebaseapp.com",
            projectId: "lwandeti-junction-minimart",
            storageBucket: "lwandeti-junction-minimart.firebasestorage.app",
            messagingSenderId: "282672112956",
            appId: "1:282672112956:web:1a85643cc1f3c410676a39"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // --- GLOBAL STATE ---
        let products = [];
        const categories = [
            { id: 'food_staples', name: 'Food Staples' },
            { id: 'beverages', name: 'Beverages & Dairy' },
            { id: 'personal_care', name: 'Hygiene & Care' },
            { id: 'household', name: 'Household Items' },
            { id: 'bakery', name: 'Bakery' },
            { id: 'stationery', name: 'Stationery' },
            { id: 'agriculture', name: 'Agriculture' },
            { id: 'hardware', name: 'Hardware' }
        ];

        // --- AUTH LOGIC ---
        function login() {
            if (document.getElementById('password').value === 'admin123') {
                localStorage.setItem('isLogged', 'true');
                initDashboard();
            } else {
                alert('Invalid Password');
            }
        }

        function logout() {
            localStorage.removeItem('isLogged');
            location.reload();
        }

        function initDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            setupCategories();
            syncData();
        }

        if (localStorage.getItem('isLogged')) initDashboard();

        // --- DATA SYNC (REAL-TIME) ---
        function syncData() {
            // Listen for changes in Firestore
            db.collection('products').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
                products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderProducts();
                
                // Update UI Status
                document.getElementById('statusDot').className = "w-2 h-2 rounded-full bg-emerald-500";
                document.getElementById('statusText').innerText = "Live Synced";
            }, (error) => {
                console.error("Sync Error:", error);
                document.getElementById('statusText').innerText = "Connection Lost";
            });
        }

        function setupCategories() {
            const selects = ['prodCategory', 'editCategory'];
            selects.forEach(id => {
                const el = document.getElementById(id);
                el.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            });
        }

        // --- CRUD OPERATIONS ---
        async function saveProduct() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Syncing...';

            const payload = {
                name: document.getElementById('prodName').value,
                price: Number(document.getElementById('prodPrice').value),
                wholesalePrice: Number(document.getElementById('prodWholesalePrice').value) || null,
                category: document.getElementById('prodCategory').value,
                unit: document.getElementById('prodUnit').value,
                popular: document.getElementById('prodPopular').checked,
                inStock: document.getElementById('prodStock').checked,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection('products').add(payload);
                document.getElementById('productForm').reset();
                showToast("Product added to Cloud!");
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Save to Cloud';
            }
        }

        async function deleteProduct(id) {
            if (confirm("Permanently delete from Cloud?")) {
                await db.collection('products').doc(id).delete();
                showToast("Deleted successfully");
            }
        }

        function openEdit(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('editId').value = p.id;
            document.getElementById('editName').value = p.name;
            document.getElementById('editPrice').value = p.price;
            document.getElementById('editWholesalePrice').value = p.wholesalePrice || '';
            document.getElementById('editCategory').value = p.category;
            document.getElementById('editModal').classList.remove('hidden');
        }

        async function updateProduct() {
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('editName').value,
                price: Number(document.getElementById('editPrice').value),
                wholesalePrice: Number(document.getElementById('editWholesalePrice').value) || null,
                category: document.getElementById('editCategory').value,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection('products').doc(id).update(data);
            closeModal();
            showToast("Cloud update successful");
        }

        // --- UI RENDERING ---
        function renderProducts(data = products) {
            const list = document.getElementById('productsList');
            if (data.length === 0) {
                list.innerHTML = '<div class="p-10 text-center text-gray-400 bg-white rounded-xl border">No products found.</div>';
                return;
            }

            list.innerHTML = data.map(p => `
                <div class="bg-white p-4 rounded-xl border flex justify-between items-center hover:shadow-md transition-shadow">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-lg flex items-center justify-center font-bold">
                            ${p.name.charAt(0)}
                        </div>
                        <div>
                            <h4 class="font-bold text-gray-800">${p.name}</h4>
                            <p class="text-xs text-gray-500">Retail: <span class="text-emerald-600 font-bold">KSh ${p.price}</span> | WS: KSh ${p.wholesalePrice || '--'}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openEdit('${p.id}')" class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg transition-colors"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProduct('${p.id}')" class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function filterItems() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(q));
            renderProducts(filtered);
        }

        function closeModal() { document.getElementById('editModal').classList.add('hidden'); }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(products, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'minimart_inventory.json';
            a.click();
        }
    </script>
</body>
</html>
