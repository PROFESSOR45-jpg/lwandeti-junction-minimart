<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Lwandeti Junction Minimart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac',
                            400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d',
                            800: '#166534', 900: '#14532d', 950: '#052e16',
                        },
                        earth: {
                            50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4', 300: '#d6d3d1',
                            400: '#a8a29e', 500: '#78716c', 600: '#57534e', 700: '#44403c',
                            800: '#292524', 900: '#1c1917',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fafaf9; }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .glass-dark { background: rgba(20, 83, 45, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .mesh-gradient { background-color: #14532d; background-image: radial-gradient(at 40% 20%, hsla(140,100%,26%,1) 0px, transparent 50%), radial-gradient(at 80% 0%, hsla(142,100%,20%,1) 0px, transparent 50%), radial-gradient(at 0% 50%, hsla(150,100%,15%,1) 0px, transparent 50%); }
        .upload-zone { border: 2px dashed #d6d3d1; transition: all 0.3s ease; }
        .upload-zone:hover { border-color: #22c55e; background-color: #f0fdf4; }
        .image-preview-container { position: relative; overflow: hidden; }
        .modal-backdrop { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
        .store-image-bg { background-image: url('https://kimi-web-img.moonshot.cn/img/www.upkenya.com/6bfed15afad146cab5bbb7ce820fd1b30b594cc6.jpg'); background-size: cover; background-position: center; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.4s ease-out; }
    </style>
</head>
<body class="text-earth-800 antialiased">

    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center mesh-gradient">
        <div class="relative z-10 w-full max-w-md px-6">
            <div class="glass-panel rounded-3xl p-8 shadow-2xl">
                <div class="text-center mb-8">
                    <h1 class="font-display text-3xl font-bold text-earth-900 mb-2">Admin Portal</h1>
                    <p class="text-earth-500 text-sm">Lwandeti Junction Minimart</p>
                </div>
                <form onsubmit="event.preventDefault(); login();" class="space-y-5">
                    <input type="text" id="username" required placeholder="Username" class="w-full px-4 py-4 bg-earth-50 border-2 border-earth-200 rounded-2xl outline-none focus:border-brand-500 transition-all">
                    <input type="password" id="password" required placeholder="Password" class="w-full px-4 py-4 bg-earth-50 border-2 border-earth-200 rounded-2xl outline-none focus:border-brand-500 transition-all">
                    <button type="submit" class="w-full bg-brand-600 text-white py-4 rounded-2xl font-display font-bold uppercase tracking-wider shadow-lg hover:bg-brand-700 transition-all">Verify Access</button>
                </form>
            </div>
        </div>
    </div>

    <div id="adminDashboard" class="hidden min-h-screen bg-earth-50">
        <header class="sticky top-0 z-40 glass-dark text-white shadow-xl">
            <div class="container mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-xl store-image-bg"></div>
                    <h1 class="font-display font-bold text-lg">Lwandeti Management</h1>
                </div>
                <button onclick="logout()" class="px-4 py-2 bg-red-500/20 hover:bg-red-500/30 text-red-200 rounded-xl text-xs font-semibold">Logout</button>
            </div>
        </header>

        <div class="container mx-auto px-4 py-8">
            <div class="mb-8 flex gap-2">
                <button onclick="switchTab('inventory')" id="tab-inventory" class="px-6 py-3 rounded-xl font-display font-semibold text-sm bg-brand-50 text-brand-700">Inventory</button>
                <button onclick="switchTab('ai')" id="tab-ai" class="px-6 py-3 rounded-xl font-display font-semibold text-sm text-earth-600 hover:bg-white">AI Scanner</button>
                <button onclick="switchTab('categories')" id="tab-categories" class="px-6 py-3 rounded-xl font-display font-semibold text-sm text-earth-600 hover:bg-white">Departments</button>
            </div>

            <div id="view-ai" class="tab-content hidden animate-fade-in">
                <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-sm border border-earth-200 overflow-hidden">
                    <div class="p-8 border-b border-earth-100 bg-gradient-to-r from-blue-50 to-purple-50">
                        <h2 class="font-display font-bold text-2xl text-earth-900">Intelligent Mass Scanner</h2>
                        <p class="text-earth-500 text-sm">Upload Images or PDFs to extract product data</p>
                    </div>
                    <div class="p-8">
                        <div class="upload-zone rounded-3xl p-12 text-center cursor-pointer" onclick="document.getElementById('aiFileInput').click()">
                            <input type="file" id="aiFileInput" class="hidden" accept="image/*,application/pdf" multiple onchange="handleAIUpload(event)">
                            <i class="fas fa-cloud-upload-alt text-4xl text-brand-500 mb-4"></i>
                            <h3 class="font-display font-bold text-xl">Drop Files Here</h3>
                        </div>

                        <div id="aiReviewSection" class="hidden mt-8">
                            <h3 class="font-display font-bold text-lg mb-4" id="aiCount">0 items detected</h3>
                            <div class="overflow-x-auto border border-earth-200 rounded-2xl">
                                <table class="w-full text-left">
                                    <thead class="bg-earth-50">
                                        <tr>
                                            <th class="px-6 py-4 text-xs font-bold uppercase">Product Name</th>
                                            <th class="px-6 py-4 text-xs font-bold uppercase">Price (KSh)</th>
                                            <th class="px-6 py-4 text-xs font-bold uppercase">Category</th>
                                            <th class="px-6 py-4 text-xs font-bold uppercase text-right">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="aiResultsTable" class="divide-y divide-earth-100"></tbody>
                                </table>
                            </div>
                            <button onclick="saveAIScannedItems(this)" class="mt-6 w-full bg-brand-600 text-white py-4 rounded-xl font-bold hover:bg-brand-700 transition-all">Confirm All Items</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-inventory" class="tab-content animate-fade-in">
                <div class="grid xl:grid-cols-12 gap-6">
                    <div class="xl:col-span-4">
                        <div class="bg-white p-6 rounded-3xl border border-earth-200">
                             <h2 class="font-display font-bold mb-4">Add Product</h2>
                             <input type="text" id="prodName" placeholder="Product Name" class="w-full p-3 mb-3 bg-earth-50 rounded-xl border">
                             <input type="number" id="prodPrice" placeholder="Price" class="w-full p-3 mb-3 bg-earth-50 rounded-xl border">
                             <select id="prodCategory" class="w-full p-3 mb-3 bg-earth-50 rounded-xl border"></select>
                             <button onclick="saveProduct()" class="w-full bg-brand-600 text-white py-3 rounded-xl">Save Product</button>
                        </div>
                    </div>
                    <div class="xl:col-span-8">
                        <div id="productsList" class="grid gap-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 transform translate-y-20 opacity-0 transition-all duration-500 z-50">
        <div class="bg-earth-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3">
            <i class="fas fa-info-circle text-brand-400"></i>
            <p id="toastMessage" class="text-sm font-medium"></p>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCi5xL9UmwubLlY0bn0Ae8TH4lG-9720oQ",
            authDomain: "lwandeti-junction-minimart.firebaseapp.com",
            projectId: "lwandeti-junction-minimart",
            storageBucket: "lwandeti-junction-minimart.firebasestorage.app",
            messagingSenderId: "282672112956",
            appId: "1:282672112956:web:1a85643cc1f3c410676a39"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // Initialize PDF.js Worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let products = [], categories = [], tempExtracted = [];

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function login() {
            if(document.getElementById('username').value === 'ADMINISTRATOR' && document.getElementById('password').value === 'admin123') {
                sessionStorage.setItem('admin_auth', 'true');
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                syncData();
            }
        }

        function syncData() {
            db.collection('categories').onSnapshot(snap => {
                categories = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                const el = document.getElementById('prodCategory');
                if(el) el.innerHTML = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            });
            db.collection('products').orderBy('createdAt', 'desc').onSnapshot(snap => {
                products = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderProducts();
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
        }

        // --- AI SCANNER LOGIC ---
        
        async function handleAIUpload(e) {
            const files = Array.from(e.target.files);
            if (!files.length) return;

            document.getElementById('aiReviewSection').classList.remove('hidden');
            document.getElementById('aiResultsTable').innerHTML = '';
            tempExtracted = [];

            showToast("Initializing AI Scanner...");
            
            const worker = await Tesseract.createWorker();
            await worker.loadLanguage('eng');
            await worker.initialize('eng');

            for (const file of files) {
                if (file.type === "application/pdf") {
                    await processPDF(file, worker);
                } else {
                    await processImage(file, worker);
                }
            }

            await worker.terminate();
            showToast("Scan Complete!");
        }

        async function processImage(file, worker) {
            const { data: { text } } = await worker.recognize(file);
            parseText(text);
        }

        async function processPDF(file, worker) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                const { data: { text } } = await worker.recognize(blob);
                parseText(text);
            }
        }

        function parseText(text) {
            const lines = text.split('\n');
            lines.forEach(line => {
                // Regex: find numeric values at the end of a string (price)
                const priceMatch = line.match(/(\d{2,5})(\.\d{2})?$/);
                if (priceMatch && line.length > 5) {
                    const price = parseFloat(priceMatch[0]);
                    const name = line.replace(priceMatch[0], '').trim();
                    
                    if (name.length > 3) {
                        const item = { name, price, category: categories[0]?.name || "General", unit: "pcs" };
                        tempExtracted.push(item);
                        renderTempRow(item, tempExtracted.length - 1);
                    }
                }
            });
            document.getElementById('aiCount').textContent = `${tempExtracted.length} items detected`;
        }

        function renderTempRow(item, index) {
            const tbody = document.getElementById('aiResultsTable');
            const tr = document.createElement('tr');
            tr.className = "animate-fade-in";
            tr.innerHTML = `
                <td class="px-6 py-4"><input type="text" value="${item.name}" onchange="updateTemp(${index}, 'name', this.value)" class="w-full bg-transparent border-b border-earth-200 outline-none"></td>
                <td class="px-6 py-4 font-bold">KSh <input type="number" value="${item.price}" onchange="updateTemp(${index}, 'price', this.value)" class="w-20 bg-transparent border-b border-earth-200 outline-none"></td>
                <td class="px-6 py-4">
                    <select onchange="updateTemp(${index}, 'category', this.value)" class="p-1 text-xs bg-earth-50 rounded">
                        ${categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('')}
                    </select>
                </td>
                <td class="px-6 py-4 text-right"><button onclick="this.closest('tr').remove()" class="text-red-400"><i class="fas fa-times"></i></button></td>
            `;
            tbody.appendChild(tr);
        }

        function updateTemp(index, field, value) {
            tempExtracted[index][field] = field === 'price' ? parseFloat(value) : value;
        }

        async function saveAIScannedItems(btn) {
            btn.disabled = true;
            btn.textContent = "Uploading to Database...";
            for (let item of tempExtracted) {
                await db.collection('products').add({
                    ...item,
                    image: 'https://via.placeholder.com/150',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            showToast(`${tempExtracted.length} items added successfully!`);
            document.getElementById('aiReviewSection').classList.add('hidden');
            btn.disabled = false;
            btn.textContent = "Confirm All Items";
        }

        function renderProducts() {
            const container = document.getElementById('productsList');
            if(!container) return;
            container.innerHTML = products.map(p => `
                <div class="flex items-center gap-4 p-4 bg-white rounded-2xl border border-earth-200 shadow-sm">
                    <img src="${p.image}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-1">
                        <h4 class="font-bold text-earth-900">${p.name}</h4>
                        <p class="text-xs text-earth-500">${p.category}</p>
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-brand-600">KSh ${p.price}</div>
                    </div>
                </div>
            `).join('');
        }

        function logout() { sessionStorage.clear(); location.reload(); }
    </script>
</body>
</html>
