<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Lwandeti Junction Minimart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80',
                            500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d', 950: '#052e16',
                        },
                        earth: {
                            50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4', 300: '#d6d3d1', 400: '#a8a29e',
                            500: '#78716c', 600: '#57534e', 700: '#44403c', 800: '#292524', 900: '#1c1917',
                        }
                    },
                    animation: {
                        'gradient-x': 'gradient-x 15s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shimmer': 'shimmer 2s linear infinite',
                        'slide-in': 'slideIn 0.3s ease-out forwards',
                        'bounce-short': 'bounceShort 0.5s ease-in-out 1'
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' },
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        'shimmer': {
                            '0%': { backgroundPosition: '-1000px 0' },
                            '100%': { backgroundPosition: '1000px 0' },
                        },
                        slideIn: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        },
                        bounceShort: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' }
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fafaf9; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .glass-dark { background: rgba(20, 83, 45, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .mesh-gradient {
            background-color: #14532d;
            background-image: 
                radial-gradient(at 40% 20%, hsla(140,100%,26%,1) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(142,100%,20%,1) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(150,100%,15%,1) 0px, transparent 50%),
                radial-gradient(at 80% 50%, hsla(145,100%,22%,1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(140,100%,30%,1) 0px, transparent 50%),
                radial-gradient(at 80% 100%, hsla(142,100%,25%,1) 0px, transparent 50%);
        }
        .noise-overlay::before {
            content: ''; position: absolute; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 1;
        }
        .input-glow:focus { box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1), 0 0 20px rgba(34, 197, 94, 0.2); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        .btn-shine { position: relative; overflow: hidden; }
        .btn-shine::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transition: left 0.5s; }
        .btn-shine:hover::before { left: 100%; }
        .store-image-bg { background-image: url('https://kimi-web-img.moonshot.cn/img/www.upkenya.com/6bfed15afad146cab5bbb7ce820fd1b30b594cc6.jpg'); background-size: cover; background-position: center; }
        .upload-zone { border: 2px dashed #d6d3d1; transition: all 0.3s ease; }
        .upload-zone:hover, .upload-zone.dragover { border-color: #22c55e; background-color: #f0fdf4; }
        .modal-backdrop { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="text-earth-800 antialiased">

    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center mesh-gradient noise-overlay">
        <div class="floating-shape w-96 h-96 bg-brand-400 top-0 left-0 animate-float" style="filter: blur(80px); opacity: 0.4;"></div>
        <div class="floating-shape w-64 h-64 bg-orange-400 bottom-0 right-0 animate-float" style="filter: blur(80px); opacity: 0.4; animation-delay: 2s;"></div>
        
        <div class="relative z-10 w-full max-w-md px-6">
            <div class="flex justify-center mb-8">
                <div class="relative group cursor-pointer">
                    <div class="absolute -inset-1 bg-gradient-to-r from-brand-400 to-orange-400 rounded-full blur opacity-75 animate-pulse-slow"></div>
                    <div class="relative w-24 h-24 rounded-full overflow-hidden border-4 border-white/20 shadow-2xl store-image-bg"></div>
                </div>
            </div>

            <div class="glass-panel rounded-3xl p-8 shadow-2xl relative overflow-hidden">
                <div class="relative z-10 text-center mb-8">
                    <h1 class="font-display text-3xl font-bold text-earth-900 mb-2 tracking-tight">Admin Portal</h1>
                    <p class="text-earth-500 text-sm">Lwandeti Junction Minimart</p>
                </div>

                <form id="loginForm" onsubmit="event.preventDefault(); login();" class="space-y-5">
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-earth-400"></i>
                        <input type="text" id="username" required placeholder="Username" class="w-full pl-11 pr-4 py-4 bg-earth-50 border-2 border-earth-200 rounded-2xl outline-none focus:border-brand-500 input-glow transition-all">
                    </div>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-earth-400"></i>
                        <input type="password" id="password" required placeholder="Password" class="w-full pl-11 pr-4 py-4 bg-earth-50 border-2 border-earth-200 rounded-2xl outline-none focus:border-brand-500 input-glow transition-all">
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-brand-600 to-brand-700 text-white py-4 rounded-2xl font-display font-bold uppercase tracking-wider shadow-lg btn-shine">
                        Verify Access
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="adminDashboard" class="hidden min-h-screen bg-earth-50">
        <header class="sticky top-0 z-40 glass-dark text-white shadow-xl">
            <div class="container mx-auto px-6 py-4 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-xl overflow-hidden border-2 border-white/20 store-image-bg"></div>
                    <div>
                        <h1 class="font-display font-bold text-lg">Lwandeti Junction</h1>
                        <p class="text-white/60 text-xs uppercase">Management Hub</p>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="downloadPriceListPDF()" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-xl text-xs font-semibold flex items-center gap-2 border border-white/10">
                        <i class="fas fa-file-pdf text-red-400"></i> Export PDF
                    </button>
                    <button onclick="logout()" class="px-4 py-2 bg-red-500/20 hover:bg-red-500/30 text-red-200 rounded-xl text-xs font-semibold border border-red-500/30">
                        Logout
                    </button>
                </div>
            </div>
        </header>

        <main class="container mx-auto px-6 py-8">
            <div class="mb-8 flex gap-2 p-1 bg-white rounded-2xl shadow-sm border border-earth-200 inline-flex">
                <button onclick="switchTab('inventory')" id="tab-inventory" class="tab-indicator active px-6 py-3 rounded-xl font-semibold text-sm transition-all text-brand-700 bg-brand-50">Inventory</button>
                <button onclick="switchTab('categories')" id="tab-categories" class="tab-indicator px-6 py-3 rounded-xl font-semibold text-sm transition-all text-earth-600">Departments</button>
                <button onclick="switchTab('ai')" id="tab-ai" class="tab-indicator px-6 py-3 rounded-xl font-semibold text-sm transition-all text-earth-600 flex items-center gap-2">
                    <i class="fas fa-robot text-blue-500"></i> AI Scanner
                </button>
            </div>

            <div id="view-inventory" class="tab-content grid xl:grid-cols-12 gap-6">
                <div class="xl:col-span-4">
                    <div class="bg-white rounded-3xl shadow-sm border border-earth-200 p-6 sticky top-24">
                        <h2 class="font-display font-bold text-earth-900 mb-6 flex items-center gap-2">
                            <i class="fas fa-plus-circle text-brand-500"></i> Add Product
                        </h2>
                        <form onsubmit="event.preventDefault(); checkDuplicateAndSave();" class="space-y-4">
                            <input type="text" id="prodName" required placeholder="Product Name" class="w-full px-4 py-3 bg-earth-50 border border-earth-200 rounded-xl outline-none focus:border-brand-500 text-sm">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="number" id="prodPrice" required placeholder="Price KSh" class="w-full px-4 py-3 bg-earth-50 border border-earth-200 rounded-xl outline-none focus:border-brand-500 text-sm">
                                <input type="text" id="prodUnit" required placeholder="Unit (e.g kg)" class="w-full px-4 py-3 bg-earth-50 border border-earth-200 rounded-xl outline-none focus:border-brand-500 text-sm">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <select id="prodCategory" required onchange="updateSubSelect('prod')" class="w-full px-4 py-3 bg-earth-50 border border-earth-200 rounded-xl text-sm"><option value="">Category</option></select>
                                <select id="prodSubCategory" required class="w-full px-4 py-3 bg-earth-50 border border-earth-200 rounded-xl text-sm"><option value="">Sub-category</option></select>
                            </div>
                            <button type="submit" class="w-full bg-brand-600 text-white py-4 rounded-xl font-bold uppercase tracking-wider shadow-lg hover:bg-brand-700 transition-all">
                                Add to stock
                            </button>
                        </form>
                    </div>
                </div>
                <div class="xl:col-span-8">
                    <div class="bg-white rounded-3xl shadow-sm border border-earth-200 overflow-hidden">
                        <div class="p-6 border-b border-earth-100 flex justify-between items-center">
                            <h2 class="font-display font-bold text-lg">Current Stock</h2>
                            <input type="text" id="searchProducts" oninput="renderProducts()" placeholder="Search..." class="px-4 py-2 bg-earth-50 border border-earth-200 rounded-xl text-sm">
                        </div>
                        <div id="productsList" class="p-6 grid gap-3"></div>
                    </div>
                </div>
            </div>

            <div id="view-categories" class="tab-content hidden max-w-2xl mx-auto bg-white rounded-3xl p-8 border border-earth-200 shadow-sm">
                <h2 class="font-display font-bold text-2xl mb-6">Manage Departments</h2>
                <form onsubmit="event.preventDefault(); saveCategory();" class="space-y-4">
                    <input type="text" id="catName" required placeholder="Department Name" class="w-full px-4 py-3 bg-earth-50 border border-earth-200 rounded-xl outline-none">
                    <textarea id="catSubs" placeholder="Sub-categories (comma separated)" class="w-full px-4 py-3 bg-earth-50 border border-earth-200 rounded-xl h-24"></textarea>
                    <button type="submit" class="w-full bg-earth-900 text-white py-4 rounded-xl font-bold">Save Department</button>
                </form>
                <div id="categoriesPreview" class="mt-8 flex flex-wrap gap-2"></div>
            </div>

            <div id="view-ai" class="tab-content hidden max-w-4xl mx-auto bg-white rounded-3xl p-8 border border-earth-200 shadow-sm">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                        <i class="fas fa-brain"></i>
                    </div>
                    <h2 class="font-display font-bold text-2xl">AI Mass Scanner</h2>
                    <p class="text-earth-500">Scan receipts or lists to add multiple items at once.</p>
                </div>
                <div class="border-2 border-dashed border-earth-300 rounded-3xl p-12 text-center bg-earth-50 cursor-pointer" onclick="document.getElementById('aiFileInput').click()">
                    <input type="file" id="aiFileInput" class="hidden" multiple onchange="handleAIUpload(event)">
                    <i class="fas fa-cloud-upload-alt text-4xl text-earth-400 mb-4"></i>
                    <p class="font-bold">Click to Upload Documents</p>
                </div>
                <div id="aiReviewSection" class="hidden mt-8">
                    <table class="w-full">
                        <tbody id="aiResultsTable"></tbody>
                    </table>
                    <button onclick="saveAIScannedItems(this)" class="w-full bg-brand-600 text-white py-4 rounded-xl mt-4">Confirm All</button>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 transform translate-y-20 opacity-0 transition-all duration-500 z-50 bg-earth-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3">
        <i class="fas fa-info-circle text-brand-400"></i>
        <div id="toastMessage"></div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const firebaseConfig = {
            // INSERT YOUR FIREBASE CONFIG HERE
            apiKey: "AIzaSy...",
            authDomain: "lwandeti-junction.firebaseapp.com",
            projectId: "lwandeti-junction",
            storageBucket: "lwandeti-junction.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let products = [];
        let categories = [];
        let tempExtracted = [];

        // --- 2. AUTHENTICATION (CORRECTED) ---
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // Logic as requested: Administrator access
            if (user === "ADMINISTRATOR" && pass === "ADMIN123") { // Replace with your desired password
                sessionStorage.setItem('admin_auth', 'true');
                showDashboard();
                showToast("Access Granted", "Welcome back, Admin");
            } else {
                showToast("Access Denied", "Invalid credentials", "error");
            }
        }

        function logout() {
            sessionStorage.removeItem('admin_auth');
            location.reload();
        }

        function checkAuth() {
            if (sessionStorage.getItem('admin_auth') === 'true') {
                showDashboard();
            }
        }

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            startListeners();
        }

        // --- 3. DATA LISTENERS ---
        function startListeners() {
            // Products Listener
            db.collection('products').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderProducts();
            });

            // Categories Listener
            db.collection('categories').onSnapshot(snapshot => {
                categories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderCategoriesPreview();
                updateCategoryDropdowns();
            });
        }

        // --- 4. INVENTORY LOGIC ---
        function renderProducts() {
            const list = document.getElementById('productsList');
            const search = document.getElementById('searchProducts').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(search));
            
            list.innerHTML = filtered.map(p => `
                <div class="flex items-center justify-between p-4 bg-earth-50 rounded-2xl border border-earth-100 card-hover">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-white rounded-lg flex items-center justify-center font-bold text-brand-600 border border-earth-200">
                            ${p.name.charAt(0)}
                        </div>
                        <div>
                            <h3 class="font-bold text-earth-900">${p.name}</h3>
                            <p class="text-xs text-earth-500">${p.category} > ${p.subCategory}</p>
                        </div>
                    </div>
                    <div class="text-right flex items-center gap-6">
                        <div>
                            <p class="text-lg font-bold text-brand-700">KSh ${parseFloat(p.price).toFixed(2)}</p>
                            <p class="text-[10px] text-earth-400 uppercase font-bold">per ${p.unit}</p>
                        </div>
                        <button onclick="deleteProduct('${p.id}')" class="text-earth-300 hover:text-red-500 transition-colors"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        async function checkDuplicateAndSave() {
            const name = document.getElementById('prodName').value;
            const price = document.getElementById('prodPrice').value;
            const unit = document.getElementById('prodUnit').value;
            const cat = document.getElementById('prodCategory').value;
            const sub = document.getElementById('prodSubCategory').value;

            await db.collection('products').add({
                name, price: parseFloat(price), unit, category: cat, subCategory: sub,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            document.querySelector('#view-inventory form').reset();
            showToast("Saved", `${name} added to stock`);
        }

        async function deleteProduct(id) {
            if(confirm("Delete this product?")) {
                await db.collection('products').doc(id).delete();
                showToast("Deleted", "Product removed from database");
            }
        }

        // --- 5. CATEGORY LOGIC ---
        function updateCategoryDropdowns() {
            const selects = ['prodCategory'];
            selects.forEach(id => {
                const el = document.getElementById(id);
                if(!el) return;
                const current = el.value;
                el.innerHTML = '<option value="">Select Category</option>' + 
                    categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
                el.value = current;
            });
        }

        function updateSubSelect(prefix) {
            const catName = document.getElementById(prefix + 'Category').value;
            const subEl = document.getElementById(prefix + 'SubCategory');
            const cat = categories.find(c => c.name === catName);
            if (cat && cat.subs) {
                subEl.innerHTML = cat.subs.map(s => `<option value="${s}">${s}</option>`).join('');
            }
        }

        async function saveCategory() {
            const name = document.getElementById('catName').value;
            const subs = document.getElementById('catSubs').value.split(',').map(s => s.trim());
            await db.collection('categories').add({ name, subs });
            document.getElementById('catName').value = '';
            document.getElementById('catSubs').value = '';
            showToast("Department Created", name);
        }

        // --- 6. UTILITIES ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            document.querySelectorAll('.tab-indicator').forEach(t => {
                t.classList.remove('active', 'text-brand-700', 'bg-brand-50');
                t.classList.add('text-earth-600');
            });
            document.getElementById('tab-' + tab).classList.add('active', 'text-brand-700', 'bg-brand-50');
        }

        function showToast(title, msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMessage').innerHTML = `<strong>${title}</strong><br>${msg}`;
            t.style.opacity = '1';
            t.style.transform = 'translateY(0)';
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translateY(20px)';
            }, 3000);
        }

        // Initialize PDF and Auth check
        window.onload = checkAuth;
    </script>
</body>
</html>
