<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lwandeti Junction Minimart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .product-card { transition: all 0.3s ease; border: 1px solid #f3f4f6; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .cart-panel { transform: translateX(100%); transition: transform 0.3s ease; }
        .cart-panel.open { transform: translateX(0); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.5s ease; }
        
        .hero-bg {
            background-image: url('https://files.catbox.moe/4ika9g.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .hero-overlay { background: linear-gradient(135deg, rgba(6, 78, 59, 0.85) 0%, rgba(6, 78, 59, 0.7) 50%, rgba(217, 119, 6, 0.6) 100%); }
        .text-shadow { text-shadow: 2px 2px 8px rgba(0,0,0,0.5); }
        .sync-indicator {
            position: fixed; top: 80px; right: 20px; background: #10b981; color: white;
            padding: 8px 16px; border-radius: 20px; font-size: 12px; z-index: 100;
            display: none; align-items: center; gap: 6px;
        }
        .sync-indicator.show { display: flex; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100px); } to { transform: translateX(0); } }
        .loading-spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid #059669; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50">

    <div id="syncIndicator" class="sync-indicator shadow-lg">
        <i class="fas fa-sync-alt fa-spin"></i><span>Updating Shop...</span>
    </div>

    <a href="admin.html" style="position: fixed; bottom: 0; right: 0; width: 20px; height: 20px; z-index: 999; opacity: 0;">.</a>

    <div class="bg-emerald-900 text-white text-sm py-2">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="flex gap-4">
                <a href="tel:0117352700" class="hover:text-yellow-400"><i class="fas fa-phone mr-1"></i> 0117 352700</a>
                <a href="https://wa.me/254117352700" class="hover:text-yellow-400"><i class="fab fa-whatsapp mr-1"></i> WhatsApp</a>
            </div>
            <div class="hidden sm:block"><i class="fas fa-map-marker-alt text-yellow-400 mr-1"></i> Lwandeti Junction, Kenya</div>
        </div>
    </div>

    <header class="sticky top-0 z-40 glass border-b shadow-sm">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between gap-4">
            <a href="#" onclick="router('home')" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-600 rounded-lg flex items-center justify-center text-white"><i class="fas fa-store"></i></div>
                <h1 class="text-xl font-bold text-emerald-900 hidden sm:block">LWANDETI JUNCTION</h1>
            </a>

            <div class="flex-1 max-w-md relative">
                <input type="text" id="searchInput" oninput="handleSearch(this.value)" placeholder="Search groceries..." class="w-full pl-10 pr-4 py-2 rounded-full border focus:ring-2 focus:ring-emerald-500 outline-none">
                <i class="fas fa-search absolute left-4 top-3 text-gray-400"></i>
            </div>

            <button onclick="toggleCart()" class="relative p-2 text-gray-600">
                <i class="fas fa-shopping-cart text-2xl"></i>
                <span id="cartBadge" class="absolute top-0 right-0 bg-orange-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold hidden">0</span>
            </button>
        </div>
        
        <nav class="bg-emerald-600 text-white overflow-x-auto whitespace-nowrap">
            <div class="container mx-auto px-4 flex" id="categoryNav">
                </div>
        </nav>
    </header>

    <main id="app" class="min-h-screen">
        <div class="flex flex-col items-center justify-center min-h-[60vh]">
            <div class="loading-spinner"></div>
            <p class="mt-4 text-gray-500 font-medium">Loading items from cloud...</p>
        </div>
    </main>

    <div id="cartOverlay" onclick="toggleCart()" class="fixed inset-0 bg-black/50 z-50 hidden transition-opacity"></div>
    <div id="cartSidebar" class="fixed top-0 right-0 h-full w-full sm:w-96 bg-white z-50 cart-panel shadow-2xl flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-emerald-50">
            <h2 class="text-xl font-bold text-emerald-900">Your Shopping Cart</h2>
            <button onclick="toggleCart()" class="text-gray-500 hover:text-black"><i class="fas fa-times text-2xl"></i></button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 border-t bg-gray-50">
            <div class="flex justify-between text-xl font-bold mb-4">
                <span>Total:</span>
                <span id="cartTotal" class="text-emerald-700">KSh 0</span>
            </div>
            <button onclick="checkout()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold hover:bg-emerald-700 flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp"></i> Complete via WhatsApp
            </button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl z-50 opacity-0 transition-all pointer-events-none">
        <span id="toastMsg">Added to cart!</span>
    </div>

    <script>
        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyCi5xL9UmwubLlY0bn0Ae8TH4lG-9720oQ",
            authDomain: "lwandeti-junction-minimart.firebaseapp.com",
            projectId: "lwandeti-junction-minimart",
            storageBucket: "lwandeti-junction-minimart.firebasestorage.app",
            messagingSenderId: "282672112956",
            appId: "1:282672112956:web:1a85643cc1f3c410676a39"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- STATE ---
        let allProducts = [];
        let cart = JSON.parse(localStorage.getItem('lwandeti_cart')) || [];
        const categories = [
            { id: 'all', name: 'All Items', icon: 'fa-border-all' },
            { id: 'food_staples', name: 'Food Staples', icon: 'fa-wheat-awn' },
            { id: 'beverages', name: 'Beverages', icon: 'fa-bottle-water' },
            { id: 'personal_care', name: 'Hygiene', icon: 'fa-pump-soap' },
            { id: 'household', name: 'Household', icon: 'fa-house-chimney' }
        ];

        // --- CORE LOGIC: REAL-TIME SYNC ---
        function initApp() {
            renderNav();
            updateCartUI();
            
            // Listen to Firestore changes
            db.collection('products').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
                allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Show "Update" indicator briefly
                const sync = document.getElementById('syncIndicator');
                sync.classList.add('show');
                setTimeout(() => sync.classList.remove('show'), 2000);
                
                router('home');
            });
        }

        function renderNav() {
            const nav = document.getElementById('categoryNav');
            nav.innerHTML = categories.map(c => `
                <button onclick="filterByCategory('${c.id}')" class="px-6 py-3 hover:bg-emerald-700 transition flex items-center gap-2">
                    <i class="fas ${c.icon}"></i> ${c.name}
                </button>
            `).join('');
        }

        function router(view, filter = 'all') {
            const app = document.getElementById('app');
            let displayProducts = allProducts;

            if(filter !== 'all') {
                displayProducts = allProducts.filter(p => p.category === filter);
            }

            app.innerHTML = `
                <div class="container mx-auto px-4 py-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                        <i class="fas fa-shopping-basket text-emerald-600"></i>
                        ${filter === 'all' ? 'Fresh Stock' : filter.replace('_', ' ')}
                    </h2>
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                        ${displayProducts.map(p => `
                            <div class="product-card bg-white rounded-xl overflow-hidden flex flex-col">
                                <div class="h-40 bg-gray-100 relative">
                                    <img src="${p.image || 'https://via.placeholder.com/300?text=Lwandeti'}" class="w-full h-full object-cover">
                                    ${p.popular ? '<span class="absolute top-2 left-2 bg-orange-500 text-white text-[10px] font-bold px-2 py-1 rounded">POPULAR</span>' : ''}
                                </div>
                                <div class="p-4 flex-1 flex flex-col">
                                    <h3 class="font-bold text-gray-800 text-sm line-clamp-2 mb-2 uppercase">${p.name}</h3>
                                    <div class="mt-auto">
                                        <div class="flex items-baseline gap-1">
                                            <span class="text-emerald-700 font-extrabold text-lg">KSh ${p.price}</span>
                                            <span class="text-gray-400 text-[10px]">/${p.unit || 'pc'}</span>
                                        </div>
                                        <button onclick="addToCart('${p.id}')" class="w-full mt-3 bg-emerald-50 text-emerald-700 py-2 rounded-lg font-bold hover:bg-emerald-600 hover:text-white transition text-xs">
                                            <i class="fas fa-cart-plus mr-1"></i> ADD TO CART
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // --- CART LOGIC ---
        function addToCart(id) {
            const p = allProducts.find(item => item.id === id);
            const exists = cart.find(item => item.id === id);
            
            if(exists) {
                exists.qty++;
            } else {
                cart.push({ ...p, qty: 1 });
            }
            
            saveCart();
            showToast(`Added ${p.name}`);
        }

        function saveCart() {
            localStorage.setItem('lwandeti_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const itemsCont = document.getElementById('cartItems');
            const badge = document.getElementById('cartBadge');
            const totalEl = document.getElementById('cartTotal');
            
            let total = 0;
            let count = 0;

            itemsCont.innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                count += item.qty;
                return `
                    <div class="flex gap-4 items-center bg-gray-50 p-3 rounded-lg">
                        <img src="${item.image}" class="w-12 h-12 rounded object-cover">
                        <div class="flex-1">
                            <h4 class="text-xs font-bold uppercase">${item.name}</h4>
                            <p class="text-emerald-600 font-bold">KSh ${item.price}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="changeQty('${item.id}', -1)" class="w-6 h-6 border rounded">-</button>
                            <span class="text-sm font-bold">${item.qty}</span>
                            <button onclick="changeQty('${item.id}', 1)" class="w-6 h-6 border rounded">+</button>
                        </div>
                    </div>
                `;
            }).join('');

            badge.innerText = count;
            badge.classList.toggle('hidden', count === 0);
            totalEl.innerText = `KSh ${total.toLocaleString()}`;
        }

        function changeQty(id, delta) {
            const item = cart.find(x => x.id === id);
            item.qty += delta;
            if(item.qty <= 0) cart = cart.filter(x => x.id !== id);
            saveCart();
        }

        function handleSearch(val) {
            const query = val.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query));
            renderResults(filtered);
        }

        function renderResults(list) {
            // Re-uses the router logic but for filtered list
            router('home'); // Simple trigger
        }

        function filterByCategory(id) {
            router('home', id);
        }

        function toggleCart() {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('cartOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('hidden');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.style.opacity = '1';
            t.style.transform = 'translate(-50%, -20px)';
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translate(-50%, 0)';
            }, 2000);
        }

        function checkout() {
            if(cart.length === 0) return alert("Your cart is empty!");
            
            let text = `*New Order: Lwandeti Junction*%0A--------------------------%0A`;
            cart.forEach(item => {
                text += `• ${item.name} (x${item.qty}) - KSh ${item.price * item.qty}%0A`;
            });
            text += `--------------------------%0A*Total: ${document.getElementById('cartTotal').innerText}*`;
            
            window.open(`https://wa.me/254117352700?text=${text}`);
        }

        // --- START ---
        initApp();
    </script>
</body>
</html>
