<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lwandeti Junction Minimart | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --brand-green: #064e3b; --brand-yellow: #fbbf24; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; color: #1a1a1a; scroll-behavior: smooth; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid #f3f4f6; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(6, 78, 59, 0.15); border-color: var(--brand-yellow); }
        .hero-bg { 
            background: linear-gradient(rgba(6, 78, 59, 0.9), rgba(6, 78, 59, 0.7)), url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80');
            background-size: cover; background-position: center;
        }
        .btn-yellow { background: var(--brand-yellow); color: var(--brand-green); transition: all 0.3s; }
        .btn-yellow:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(251, 191, 36, 0.3); }
    </style>
</head>
<body class="bg-white">

    <div class="bg-[#043327] text-white py-2 px-6">
        <div class="container mx-auto flex justify-between items-center text-[10px] font-bold uppercase tracking-[0.2em]">
            <div class="flex gap-6">
                <span><i class="fas fa-phone text-brand-yellow mr-2"></i> 0117 352700</span>
                <span><i class="fas fa-envelope text-brand-yellow mr-2"></i> junctionsupa@gmail.com</span>
            </div>
            <span class="hidden sm:inline">Lwandeti Junction, Webuye-Eldoret Hwy</span>
        </div>
    </div>

    <header class="sticky top-0 z-50 glass-nav border-b border-gray-100">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
            <a href="#" onclick="router('home')" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#064e3b] rounded-lg flex items-center justify-center text-[#fbbf24] shadow-lg">
                    <i class="fas fa-shopping-basket"></i>
                </div>
                <h1 class="text-xl font-black text-emerald-950 tracking-tighter">LWANDETI <span class="text-emerald-600">JUNCTION</span></h1>
            </a>
            <nav class="hidden lg:flex gap-8 text-[11px] font-black uppercase tracking-widest" id="navLinks"></nav>
            <button onclick="toggleCart()" class="relative p-2">
                <i class="fas fa-shopping-cart text-2xl text-emerald-950"></i>
                <span id="cartBadge" class="absolute -top-1 -right-1 bg-[#fbbf24] text-[#064e3b] text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-black border-2 border-white hidden">0</span>
            </button>
        </div>
    </header>

    <div id="app"></div>

    <div id="cartOverlay" onclick="toggleCart()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden"></div>
    <div id="cartSidebar" class="fixed top-0 right-0 h-full w-full sm:w-[400px] bg-white z-50 translate-x-full transition-transform duration-500 flex flex-col">
        <div class="p-8 bg-[#064e3b] text-white flex justify-between items-center">
            <h2 class="text-2xl font-black uppercase tracking-tighter">Your Cart</h2>
            <button onclick="toggleCart()"><i class="fas fa-times text-2xl"></i></button>
        </div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-6 space-y-4 bg-gray-50"></div>
        <div class="p-8 border-t">
            <div class="flex justify-between text-2xl font-black mb-6"><span>Total:</span><span id="cartTotal">KSh 0</span></div>
            <button onclick="checkout()" class="w-full btn-yellow py-5 rounded-xl font-black uppercase tracking-widest flex items-center justify-center gap-3">
                <i class="fab fa-whatsapp"></i> Order on WhatsApp
            </button>
        </div>
    </div>

    <footer class="bg-[#064e3b] text-white pt-20 pb-10 mt-20">
        <div class="container mx-auto px-6 grid md:grid-cols-3 gap-12 border-b border-white/10 pb-12">
            <div>
                <h3 class="text-2xl font-black mb-4">LWANDETI <span class="text-brand-yellow">JUNCTION</span></h3>
                <p class="text-emerald-100/60 text-sm">Your premium neighborhood partner for groceries, hardware, and essentials.</p>
            </div>
            <div>
                <h4 class="text-brand-yellow font-black uppercase text-[10px] mb-4">Contact Us</h4>
                <p class="text-sm">0117 352700<br>junctionsupa@gmail.com</p>
            </div>
            <div id="footerCats"></div>
        </div>
        <p class="text-center pt-10 text-[10px] font-bold uppercase text-emerald-700 tracking-widest">© 2026 Lwandeti Junction Minimart</p>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCi5xL9UmwubLlY0bn0Ae8TH4lG-9720oQ",
            authDomain: "lwandeti-junction-minimart.firebaseapp.com",
            projectId: "lwandeti-junction-minimart",
            storageBucket: "lwandeti-junction-minimart.firebasestorage.app",
            messagingSenderId: "282672112956",
            appId: "1:282672112956:web:1a85643cc1f3c410676a39"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let storeData = { categories: [], products: [] };
        let cart = JSON.parse(localStorage.getItem('junction_cart')) || [];

        function init() {
            db.collection('categories').onSnapshot(s => {
                storeData.categories = s.docs.map(d => d.data());
                renderNav();
            });
            db.collection('products').onSnapshot(s => {
                storeData.products = s.docs.map(d => ({id: d.id, ...d.data()}));
                router('home');
            });
            updateCartUI();
        }

        function renderNav() {
            const html = `<button onclick="router('home')">Home</button>` + storeData.categories.map(c => `<button onclick="router('cat','${c.name}')">${c.name}</button>`).join('');
            document.getElementById('navLinks').innerHTML = html;
        }

        function router(page, param) {
            const app = document.getElementById('app');
            if(page === 'home') app.innerHTML = renderHome();
            else app.innerHTML = renderList(storeData.products.filter(p => p.category === param), param);
        }

        function renderHome() {
            return `
                <section class="hero-bg min-h-[60vh] flex items-center px-6">
                    <div class="container mx-auto">
                        <h1 class="text-5xl md:text-8xl font-black text-white leading-none uppercase tracking-tighter">Freshly Sourced.<br><span class="text-brand-yellow">Daily Essentials.</span></h1>
                        <button onclick="router('cat','General')" class="btn-yellow mt-8 px-10 py-4 rounded-xl font-black uppercase">Browse Shop</button>
                    </div>
                </section>
                <div class="container mx-auto px-6 py-20">
                    <h2 class="text-4xl font-black mb-12 uppercase tracking-tighter text-[#064e3b]">Featured Products</h2>
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-8">${storeData.products.slice(0,10).map(p => renderCard(p)).join('')}</div>
                </div>`;
        }

        function renderList(items, title) {
            return `<div class="container mx-auto px-6 py-20"><h2 class="text-4xl font-black mb-12 uppercase text-[#064e3b]">${title}</h2><div class="grid grid-cols-2 md:grid-cols-5 gap-8">${items.map(p => renderCard(p)).join('')}</div></div>`;
        }

        function renderCard(p) {
            return `
                <div class="product-card rounded-2xl overflow-hidden bg-white">
                    <div class="h-48 overflow-hidden"><img src="${p.image}" class="w-full h-full object-cover"></div>
                    <div class="p-5">
                        <h3 class="font-black text-sm uppercase text-emerald-950">${p.name}</h3>
                        <p class="text-2xl font-black text-emerald-700 mt-2">KSh ${p.price}</p>
                        <button onclick="addToCart('${p.id}')" class="w-full mt-4 bg-gray-100 py-2 rounded-lg font-bold text-xs hover:bg-brand-yellow hover:text-brand-green transition">Add to Cart</button>
                    </div>
                </div>`;
        }

        function addToCart(id) {
            const p = storeData.products.find(x => x.id === id);
            const exists = cart.find(x => x.id === id);
            exists ? exists.qty++ : cart.push({...p, qty:1});
            localStorage.setItem('junction_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const cont = document.getElementById('cartItems');
            let total = 0, count = 0;
            cont.innerHTML = cart.map(item => {
                total += (item.price * item.qty); count += item.qty;
                return `<div class="flex gap-4 items-center bg-white p-3 rounded-xl border">
                    <img src="${item.image}" class="w-12 h-12 rounded object-cover">
                    <div class="flex-1"><h4 class="font-bold text-[10px] uppercase">${item.name}</h4><p class="font-black text-emerald-700 text-sm">KSh ${item.price}</p></div>
                    <div class="flex items-center gap-2"><button onclick="changeQty('${item.id}',-1)" class="w-6 h-6 border rounded-full text-xs">-</button><span class="text-xs font-black">${item.qty}</span><button onclick="changeQty('${item.id}',1)" class="w-6 h-6 border rounded-full text-xs">+</button></div>
                </div>`;
            }).join('');
            document.getElementById('cartBadge').innerText = count;
            document.getElementById('cartBadge').classList.toggle('hidden', count === 0);
            document.getElementById('cartTotal').innerText = `KSh ${total}`;
        }

        function changeQty(id, d) {
            const i = cart.find(x => x.id === id);
            if(i) { i.qty += d; if(i.qty <= 0) cart = cart.filter(x => x.id !== id); }
            localStorage.setItem('junction_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('translate-x-full');
            document.getElementById('cartOverlay').classList.toggle('hidden');
        }

        function checkout() {
            let msg = `*NEW ORDER - LWANDETI JUNCTION*%0A`;
            cart.forEach(i => msg += `- ${i.name} (x${i.qty})%0A`);
            msg += `*TOTAL: ${document.getElementById('cartTotal').innerText}*`;
            window.open(`https://wa.me/254117352700?text=${msg}`);
        }
        init();
    </script>
</body>
</html>
